name: Python CI Pipeline

# Complete example for Python applications using DevX reusable workflows
# Includes: build, test, security scanning, Docker, and SBOM generation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  security-events: write
  packages: write

jobs:
  # ============================================================================
  # STAGE 1: BUILD & TEST
  # ============================================================================
  build-and-test:
    name: Build & Test Python App
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/python-build.yaml@main
    with:
      working_directory: .
      python_version: "3.11"
      install_command: "pip install -r requirements.txt"
      run_tests: true
      test_script: "python -m pytest tests/ -v --cov=src"
      build_command: "python -m build"
      artifact_path: "dist/"

  # ============================================================================
  # STAGE 2: SECURITY SCANS
  # ============================================================================
  
  # SAST: Static Application Security Testing
  sast-scan:
    name: SAST Scan (Semgrep)
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/sast-scan.yaml@main
    with:
      scan_path: ./src
      exclude_paths: "venv/,__pycache__/,dist/,build/,tests/,.pytest_cache/"
      ruleset: p/default
      severity_threshold: ERROR
      fail_on_findings: true

  # Filesystem vulnerability scan
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/trivy-scan.yaml@main
    with:
      scan_type: fs
      scan_path: .
      severity_threshold: "CRITICAL,HIGH"
      fail_on_vuln: true
      scanners: "vuln,secret"

  # ============================================================================
  # STAGE 3: DOCKER BUILD
  # ============================================================================
  docker-build:
    name: Build Docker Image
    if: github.ref == 'refs/heads/main'
    needs: [build-and-test, sast-scan, trivy-fs-scan]
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/docker-build.yaml@main
    with:
      working_directory: .
      dockerfile: Dockerfile
      image_name: sample-python-app
      image_tag: ${{ github.sha }}
      registry_type: ecr
      aws_region: us-east-1
      role_to_assume: arn:aws:iam::123456789012:role/GitHubActionsECRRole
      platforms: linux/amd64
      build_args: |
        PYTHON_VERSION=3.11
        APP_VERSION=${{ github.sha }}

  # ============================================================================
  # STAGE 4: CONTAINER SECURITY SCAN
  # ============================================================================
  trivy-image-scan:
    name: Scan Container Image
    if: github.ref == 'refs/heads/main'
    needs: docker-build
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/trivy-scan.yaml@main
    with:
      scan_type: image
      image_uri: ${{ needs.docker-build.outputs.image_uri }}
      severity_threshold: "CRITICAL,HIGH"
      fail_on_vuln: true

  # ============================================================================
  # STAGE 5: SBOM GENERATION
  # ============================================================================
  generate-sbom:
    name: Generate SBOM
    if: github.ref == 'refs/heads/main'
    needs: docker-build
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/sbom-gen.yaml@main
    with:
      image: ${{ needs.docker-build.outputs.image_uri }}
      format: cyclonedx-json
