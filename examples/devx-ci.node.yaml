project:
  language: node
  version: "20"

build:
  run_build: true
  build_script: "build"
  # Path to the artifact created by the build (e.g., a zip or tgz)
  artifact_path: "dist.tgz"

artifactory:
  enabled: true
  url: "https://your-jfrog-instance.jfrog.io/artifactory"
  repository: "node-repo-local"
  artifact_file: "app-dist.tgz"
  # For non-maven, use upload_path
  upload_path: "my-node-app/1.0.0/app-dist.tgz"

docker:
  enabled: true
  image_name: my-node-app
  build_args: |
    ARTIFACTORY_URL=https://your-jfrog-instance.jfrog.io/artifactory
    ARTIFACTORY_REPO=node-repo-local
    ARTIFACT_PATH=my-node-app/1.0.0/app-dist.tgz
