name: Java/Maven CI Pipeline

# Complete example for Maven/Java applications using DevX reusable workflows
# Includes: build, test, security scanning, Docker, and SBOM generation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  security-events: write
  packages: write

jobs:
  # ============================================================================
  # STAGE 1: BUILD & TEST
  # ============================================================================
  build-and-test:
    name: Build & Test Java App
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/maven-build.yaml@main
    with:
      working_directory: .
      java_version: "17"
      distribution: "temurin"
      run_tests: true
      test_script: "mvn test -B"
      maven_args: "-B clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true"
      artifact_path: "target/*.jar"

  # ============================================================================
  # STAGE 2: SECURITY SCANS
  # ============================================================================
  
  # SAST: Static Application Security Testing
  sast-scan:
    name: SAST Scan (Semgrep)
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/sast-scan.yaml@main
    with:
      scan_path: ./src
      exclude_paths: "target/,test/,.m2/"
      ruleset: p/owasp-top-ten
      severity_threshold: ERROR
      fail_on_findings: true

  # Filesystem vulnerability scan
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/trivy-scan.yaml@main
    with:
      scan_type: fs
      scan_path: .
      severity_threshold: "CRITICAL,HIGH"
      fail_on_vuln: true
      scanners: "vuln,secret"

  # ============================================================================
  # STAGE 3: DOCKER BUILD
  # ============================================================================
  docker-build:
    name: Build Docker Image
    if: github.ref == 'refs/heads/main'
    needs: [build-and-test, sast-scan, trivy-fs-scan]
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/docker-build.yaml@main
    with:
      working_directory: .
      dockerfile: Dockerfile
      image_name: sample-java-app
      image_tag: ${{ github.sha }}
      registry_type: ecr
      aws_region: us-east-1
      role_to_assume: arn:aws:iam::123456789012:role/GitHubActionsECRRole
      platforms: linux/amd64
      build_args: |
        JAVA_VERSION=17
        JAR_FILE=target/app.jar
        BUILD_VERSION=${{ github.sha }}

  # ============================================================================
  # STAGE 4: CONTAINER SECURITY SCAN
  # ============================================================================
  trivy-image-scan:
    name: Scan Container Image
    if: github.ref == 'refs/heads/main'
    needs: docker-build
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/trivy-scan.yaml@main
    with:
      scan_type: image
      image_uri: ${{ needs.docker-build.outputs.image_uri }}
      severity_threshold: "CRITICAL,HIGH"
      fail_on_vuln: true

  # ============================================================================
  # STAGE 5: SBOM GENERATION
  # ============================================================================
  generate-sbom:
    name: Generate SBOM
    if: github.ref == 'refs/heads/main'
    needs: docker-build
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/sbom-gen.yaml@main
    with:
      image: ${{ needs.docker-build.outputs.image_uri }}
      format: cyclonedx-json
