# DevX CI Configuration for Demo Maven Application
# This demonstrates all features of the reusable workflows

project:
  language: maven
  version: "17"
  working_directory: "."

build:
  enabled: true
  run_tests: false
  test_script: "mvn test -B"
  build_script: "-B clean package -DskipTests"
  artifact_path: "target/*.jar"

security:
  # SAST: Static Application Security Testing
  sast:
    enabled: false
    tool: sonarqube
    scan_path: "src"
    # Self-Hosted SonarQube Configuration
    sonar_host_url: "https://code-review.quipohealth.com"
    sonar_organization: ""
    sonar_project_key: "DevxReusableWorkflow-DemoMavenProject-Test"
    fail_on_quality_gate: true

  # IaC: Not needed for simple Maven app
  iac:
    enabled: false
    working_directory: "infra"
    frameworks: terraform
  
  # Trivy: Container vulnerability scanning
  trivy:
    enabled: false
    severity: CRITICAL
    fail_on_vuln: false
    ignore_unfixed: true
    scanners: vuln,secret,misconfig
  
  # SBOM: Software Bill of Materials
  sbom:
    enabled: false
    format: cyclonedx-json
  
  # SBOM Scan: Vulnerability analysis
  sbom_scan:
    enabled: false
    severity: medium
    format: sarif

docker:
  enabled: true
  dockerfile: Dockerfile
  image_name: demo-maven-app
  image_tag: ""                  # Uses git SHA by default
  
  # Registry configuration
  registry_type: nexus           # Pushing images to Nexus (SSoT)
  
  platforms: linux/amd64         # Single platform for faster builds

# Sonatype Nexus Configuration
nexus:
  enabled: true
  url: "https://needfully-footless-wilburn.ngrok-free.dev"
  repository: "maven-releases"
  # Docker Registry Info
  docker_registry_url: "distributor-venue-authorized-techniques.trycloudflare.com"
  docker_repository: "docker-hosted"

# AWS Configuration (required if registry_type: ecr)
aws:
  region: ca-central-1
  role_to_assume: arn:aws:iam::653405621825:role/GitHubActionsRole-test
  # test commit 10