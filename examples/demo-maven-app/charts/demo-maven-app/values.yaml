replicaCount: 1

image:
  repository: chevy-pushing-duties-ladder.trycloudflare.com/docker-hosted/demo-maven-app
  pullPolicy: Always
  tag: "latest"

imagePullSecretsName: nexus-credentials
imagePullSecrets:
  - name: nexus-credentials

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http

nodeSelector: {}
tolerations: []
affinity: {}
