# Example DevX CI Config for Node.js
project:
  language: node
  version: "20"
  working_directory: "."

build:
  run_tests: true
  run_build: true
  build_script: "npm run build"

nexus:
  url: "https://nexus.example.com"
  repository: "npm-hosted"
  repo_type: "npm"
  docker_registry_url: "nexus.example.com:8082"

security:
  sast:
    enabled: true
  trivy:
    enabled: true
  sbom:
    enabled: true

docker:
  enabled: true
  image_name: demo-node-app
  registry_type: nexus
