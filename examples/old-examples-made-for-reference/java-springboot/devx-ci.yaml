# DevX CI Configuration for Java Spring Boot Application
# This configuration enables automated CI/CD with security scanning

project:
  language: maven
  version: "17"                  # Java 17 LTS
  working_directory: "."

build:
  run_tests: true                # Run mvn test before building
  run_build: true
  build_script: "-B clean package -DskipTests"
  artifact_path: "target/*.jar"  # Upload JAR file as artifact

nexus:
  url: "https://nexus.example.com"
  repository: "maven-releases"
  docker_registry_url: "nexus.example.com:8082"

security:
  # SAST: Static Application Security Testing
  sast:
    enabled: true
    scan_path: "./src/main/java" # Only scan source code
    exclude_paths: "src/test/,target/,.mvn/"
    severity: ERROR              # Report ERROR level findings
    fail_on_findings: true       # Block pipeline if issues found
  
  # IaC: Infrastructure as Code scanning
  iac:
    enabled: false
  
  # Trivy: Container vulnerability scanning
  trivy:
    enabled: true
    severity: CRITICAL,HIGH      # Block on critical and high severity
    fail_on_vuln: true           # Block pipeline if vulnerabilities found
  
  # SBOM: Software Bill of Materials
  sbom:
    enabled: true
    format: cyclonedx-json       # Industry standard format
  
  # SBOM Scan: Vulnerability scanning based on SBOM
  sbom_scan:
    enabled: true
    severity: medium             # Report medium and above
    format: sarif                # Upload to GitHub Security tab

docker:
  enabled: true
  dockerfile: Dockerfile
  image_name: java-springboot-api # Your app name
  image_tag: ""                   # Defaults to git commit SHA
  registry_type: nexus            # Pushing images to Nexus
  
  # Multi-line build arguments
  build_args: |
    JAVA_OPTS=-Xmx512m -Xms256m
    BUILD_DATE=${{ github.event.head_commit.timestamp }}
  
  platforms: linux/amd64          # Single platform (faster builds)

# AWS Configuration (required if registry_type: ecr)
aws:
  region: us-east-1
  role_to_assume: arn:aws:iam::123456789012:role/GitHubActionsRole