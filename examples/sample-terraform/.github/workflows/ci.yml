name: Infrastructure CI Pipeline

# Complete example for Infrastructure-as-Code projects
# Includes: Terraform validation, security scanning, and compliance checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ============================================================================
  # STAGE 1: TERRAFORM VALIDATION
  # ============================================================================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format Check
        working-directory: ./infrastructure
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ./infrastructure
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./infrastructure
        run: terraform validate

  # ============================================================================
  # STAGE 2: IAC SECURITY SCANNING
  # ============================================================================
  
  # Checkov IaC Security Scan
  iac-scan:
    name: IaC Security Scan (Checkov)
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/iac-scan.yaml@main
    with:
      working_directory: ./infrastructure
      frameworks: terraform
      soft_fail: false  # Block on security violations
      skip_check: ""    # Scan all checks
      upload_sarif: true

  # SAST scan for any scripts or code
  sast-scan:
    name: SAST Scan
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/sast-scan.yaml@main
    with:
      scan_path: ./infrastructure
      exclude_paths: ".terraform/,.terraform.lock.hcl"
      ruleset: p/ci
      fail_on_findings: true

  # Trivy filesystem scan for vulnerabilities
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/trivy-scan.yaml@main
    with:
      scan_type: fs
      scan_path: ./infrastructure
      severity_threshold: "CRITICAL,HIGH,MEDIUM"
      fail_on_vuln: false  # Advisory mode for IaC
      scanners: "vuln,secret,misconfig,config"

  # ============================================================================
  # STAGE 3: TERRAFORM PLAN (PR only)
  # ============================================================================
  terraform-plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    needs: [terraform-validate, iac-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/TerraformRole
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ./infrastructure
        run: terraform init

      - name: Terraform Plan
        working-directory: ./infrastructure
        run: terraform plan -no-color -out=tfplan

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('./infrastructure/tfplan', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

