name: Microservices CI Pipeline

# Advanced example showing multi-service repository with:
# - Multiple build jobs (frontend + backend)
# - Separate Docker images
# - Security scans
# - Integration testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  security-events: write
  packages: write

jobs:
  # ============================================================================
  # FRONTEND BUILD & TEST
  # ============================================================================
  frontend-build:
    name: Build Frontend (React)
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/node-build.yaml@main
    with:
      working_directory: ./frontend
      node_version: "20"
      run_tests: true
      test_script: "npm run test:ci"
      build_script: "npm run build"
      artifact_path: "build/"

  # ============================================================================
  # BACKEND BUILD & TEST
  # ============================================================================
  backend-build:
    name: Build Backend (Python)
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/python-build.yaml@main
    with:
      working_directory: ./backend
      python_version: "3.11"
      run_tests: true
      test_script: "pytest tests/ -v --cov=app"
      artifact_path: ""

  # ============================================================================
  # SECURITY SCANS (Parallel)
  # ============================================================================
  sast-frontend:
    name: SAST Frontend
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/sast-scan.yaml@main
    with:
      scan_path: ./frontend/src
      exclude_paths: "node_modules/,build/,coverage/"
      ruleset: p/ci

  sast-backend:
    name: SAST Backend
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/sast-scan.yaml@main
    with:
      scan_path: ./backend/app
      exclude_paths: "venv/,__pycache__/,tests/"
      ruleset: p/default

  trivy-scan:
    name: Trivy Scan
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/trivy-scan.yaml@main
    with:
      scan_type: fs
      scan_path: .
      severity_threshold: "CRITICAL,HIGH"

  # ============================================================================
  # DOCKER BUILDS (Main branch only)
  # ============================================================================
  docker-frontend:
    name: Build Frontend Image
    if: github.ref == 'refs/heads/main'
    needs: [frontend-build, sast-frontend, trivy-scan]
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/docker-build.yaml@main
    with:
      working_directory: ./frontend
      image_name: microservices-frontend
      image_tag: ${{ github.sha }}
      registry_type: ecr
      aws_region: us-east-1
      role_to_assume: arn:aws:iam::123456789012:role/GitHubActionsECRRole

  docker-backend:
    name: Build Backend Image
    if: github.ref == 'refs/heads/main'
    needs: [backend-build, sast-backend, trivy-scan]
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/docker-build.yaml@main
    with:
      working_directory: ./backend
      image_name: microservices-backend
      image_tag: ${{ github.sha }}
      registry_type: ecr
      aws_region: us-east-1
      role_to_assume: arn:aws:iam::123456789012:role/GitHubActionsECRRole

  # ============================================================================
  # IMAGE SECURITY SCANS
  # ============================================================================
  scan-frontend-image:
    name: Scan Frontend Image
    if: github.ref == 'refs/heads/main'
    needs: docker-frontend
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/trivy-scan.yaml@main
    with:
      scan_type: image
      image_uri: ${{ needs.docker-frontend.outputs.image_uri }}
      fail_on_vuln: true

  scan-backend-image:
    name: Scan Backend Image
    if: github.ref == 'refs/heads/main'
    needs: docker-backend
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/trivy-scan.yaml@main
    with:
      scan_type: image
      image_uri: ${{ needs.docker-backend.outputs.image_uri }}
      fail_on_vuln: true

  # ============================================================================
  # SBOM GENERATION
  # ============================================================================
  sbom-frontend:
    name: SBOM Frontend
    if: github.ref == 'refs/heads/main'
    needs: docker-frontend
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/sbom-gen.yaml@main
    with:
      image: ${{ needs.docker-frontend.outputs.image_uri }}

  sbom-backend:
    name: SBOM Backend
    if: github.ref == 'refs/heads/main'
    needs: docker-backend
    uses: AOT-Technologies/devx-reusable-workflows/.github/workflows/sbom-gen.yaml@main
    with:
      image: ${{ needs.docker-backend.outputs.image_uri }}
