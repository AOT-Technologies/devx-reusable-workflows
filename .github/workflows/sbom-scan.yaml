name: "Module: SBOM Vulnerability Scan (Grype)"
# ------------------------------------------------------------------------------
# Vulnerability analysis based on existing SBOMs.
#
# PURPOSE:
# - Post-build / post-release analysis
# - Incident response (retroactive scanning)
# - Compliance & audit support
#
# GUARANTEES:
# - NEVER fails the pipeline (Report Only)
# - Supports scanning Artifacts from previous jobs
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      # --- TARGET ---
      sbom_path:
        description: "Path to SBOM file (if local in repo)"
        type: string
        default: ""
      
      sbom_artifact_name:
        description: "Artifact name to download (if SBOM is from previous job)"
        type: string
        default: ""

      # --- POLICY (Reporting Only) ---
      severity_threshold:
        description: "Severities to report (negligible,low,medium,high,critical)"
        type: string
        default: "medium"

      # --- OUTPUT ---
      output_format:
        description: "Output format (table, json, sarif)"
        type: string
        default: "sarif"

      upload_sarif:
        description: "Upload SARIF to GitHub Security tab"
        type: boolean
        default: true

      upload_artifact:
        description: "Upload scan report as artifact"
        type: boolean
        default: true

    outputs:
      scan_report_artifact:
        description: "Name of the uploaded scan report artifact"
        value: ${{ jobs.sbom-scan.outputs.report_name }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      sbom_path:
        description: "Path to SBOM file"
        type: string
        default: ""
      sbom_artifact_name:
        description: "Artifact name to download"
        type: string
        default: ""
      severity_threshold:
        description: "Severity threshold"
        type: choice
        options:
          - negligible
          - low
          - medium
          - high
          - critical
        default: "medium"
      output_format:
        description: "Output format"
        type: choice
        options:
          - sarif
          - json
          - table
        default: "sarif"
      upload_sarif:
        description: "Upload SARIF"
        type: boolean
        default: true
      upload_artifact:
        description: "Upload report artifact"
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sbom-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    outputs:
      report_name: ${{ steps.set_output.outputs.report_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      # ------------------------------------------------------------------------
      # ARTIFACT RETRIEVAL
      # ------------------------------------------------------------------------
      - name: Download SBOM Artifact
        if: inputs.sbom_artifact_name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.sbom_artifact_name }}
          path: .

      # ------------------------------------------------------------------------
      # VALIDATION & DISCOVERY
      # ------------------------------------------------------------------------
      - name: Locate SBOM File
        run: |
          # 1. Start with the explicit path input
          SBOM_FILE="${{ inputs.sbom_path }}"
          
          # 2. If no path, but artifact was downloaded, look for SBOM files specifically
          if [[ -z "$SBOM_FILE" && -n "${{ inputs.sbom_artifact_name }}" ]]; then
            echo "🔍 Searching for SBOM file in current directory..."
            ls -R .
            # First try: Look for files matching sbom-*.json pattern
            SBOM_FILE=$(find . -maxdepth 2 -name "sbom-*.json" -type f -print -quit)
            
            # Second try: Look for files containing SBOM markers (CycloneDX or SPDX)
            if [[ -z "$SBOM_FILE" ]]; then
              echo "Looking for SBOM format markers..."
              for json_file in $(find . -maxdepth 2 -name "*.json" -type f); do
                if grep -q -E '"bomFormat"|"spdxVersion"' "$json_file" 2>/dev/null; then
                  SBOM_FILE="$json_file"
                  echo "Found SBOM format in: $json_file"
                  break
                fi
              done
            fi
          fi
          
          # 3. Final Validation
          if [[ ! -f "$SBOM_FILE" ]]; then
            echo "::error::SBOM file not found."
            ls -R .
            exit 1
          fi
          
          echo "Using SBOM file: $SBOM_FILE"
          echo "SBOM_FILE=$SBOM_FILE" >> $GITHUB_ENV

      # ------------------------------------------------------------------------
      # EXECUTION (Grype CLI)
      # ------------------------------------------------------------------------
      - name: Install Grype
        run: |
          VERSION="v0.74.7"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin ${VERSION}
          grype version

      - name: Run Grype Analysis
        timeout-minutes: 10
        run: |
          echo "🔍 Updating Grype Database..."
          grype db update || echo "::warning::Grype DB update failed. Attempting to scan with existing DB."
          
          echo "🔍 Scanning SBOM: ${{ env.SBOM_FILE }}"
          grype sbom:${{ env.SBOM_FILE }} \
            --fail-on ${{ inputs.severity_threshold }} \
            --output ${{ inputs.output_format }} \
            --file grype-results.${{ inputs.output_format }}

      # ------------------------------------------------------------------------
      # REPORTING
      # ------------------------------------------------------------------------
      - name: Upload SARIF to Security Tab
        if: inputs.upload_sarif == true && inputs.output_format == 'sarif' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-results.sarif
          category: sbom-grype

      - name: Upload Scan Report Artifact
        if: inputs.upload_artifact == true && always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: sbom-scan-report-${{ github.sha }}
          path: grype-results.*
          retention-days: 180

      - name: Set Output
        id: set_output
        run: |
          if [[ "${{ inputs.upload_artifact }}" == "true" ]]; then
            echo "report_name=sbom-scan-report-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "report_name=" >> $GITHUB_OUTPUT
          fi
