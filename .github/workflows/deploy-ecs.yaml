name: "Module: Deploy to ECS"

# ------------------------------------------------------------------------------
# Amazon ECS deployment with rolling updates.
# Supports: Fargate, EC2 launch types.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        type: string
        required: true
      image_uri:
        description: "Docker image URI"
        type: string
        required: true
      
      # ECS settings
      cluster_name:
        description: "ECS cluster name"
        type: string
        required: true
      service_name:
        description: "ECS service name"
        type: string
        required: true
      task_definition_family:
        description: "Task definition family name"
        type: string
        required: true
      container_name:
        description: "Container name in task definition"
        type: string
        required: true
      
      # Deployment settings
      desired_count:
        description: "Desired task count (0 = keep current)"
        type: string
        default: "0"
      force_new_deployment:
        description: "Force new deployment"
        type: boolean
        default: true
      wait_for_stability:
        description: "Wait for service stability"
        type: boolean
        default: true
      
      # AWS
      aws_region:
        description: "AWS region"
        type: string
        default: "us-east-1"
      role_to_assume:
        description: "AWS IAM role for OIDC"
        type: string
        required: true

    outputs:
      status:
        description: "Deployment status"
        value: ${{ jobs.deploy.outputs.status }}
      task_definition_arn:
        description: "New task definition ARN"
        value: ${{ jobs.deploy.outputs.task_arn }}
      service_arn:
        description: "Updated service ARN"
        value: ${{ jobs.deploy.outputs.service_arn }}

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    environment:
      name: ${{ inputs.environment }}
    
    outputs:
      status: ${{ steps.result.outputs.status }}
      task_arn: ${{ steps.register.outputs.task_arn }}
      service_arn: ${{ steps.update.outputs.service_arn }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Get Current Task Definition
        id: current_task
        run: |
          echo "📋 Fetching current task definition..."
          
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ inputs.task_definition_family }}" \
            --query 'taskDefinition' \
            --output json)
          
          # Save to file for manipulation
          echo "$TASK_DEF" > current-task-def.json
          
          # Extract current image
          CURRENT_IMAGE=$(echo "$TASK_DEF" | jq -r ".containerDefinitions[] | select(.name==\"${{ inputs.container_name }}\") | .image")
          echo "Current image: $CURRENT_IMAGE"
          echo "current_image=$CURRENT_IMAGE" >> $GITHUB_OUTPUT

      - name: Update Task Definition
        id: update_task
        run: |
          echo "🔄 Updating task definition with new image..."
          
          NEW_IMAGE="${{ inputs.image_uri }}"
          
          # Update image in task definition
          jq --arg image "$NEW_IMAGE" --arg container "${{ inputs.container_name }}" \
            '.containerDefinitions = [.containerDefinitions[] | if .name == $container then .image = $image else . end]' \
            current-task-def.json > updated-task-def.json
          
          # Remove fields that can't be in register-task-definition
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            updated-task-def.json > new-task-def.json
          
          echo "Task definition updated"

      - name: Register New Task Definition
        id: register
        run: |
          echo "📝 Registering new task definition..."
          
          TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          echo "New task definition: $TASK_ARN"
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS Service
        id: update
        run: |
          echo "🚀 Updating ECS service..."
          
          CLUSTER="${{ inputs.cluster_name }}"
          SERVICE="${{ inputs.service_name }}"
          TASK_ARN="${{ steps.register.outputs.task_arn }}"
          
          # Build update command
          UPDATE_CMD="aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $TASK_ARN"
          
          if [[ "${{ inputs.force_new_deployment }}" == "true" ]]; then
            UPDATE_CMD="$UPDATE_CMD --force-new-deployment"
          fi
          
          if [[ "${{ inputs.desired_count }}" -gt 0 ]]; then
            UPDATE_CMD="$UPDATE_CMD --desired-count ${{ inputs.desired_count }}"
          fi
          
          # Execute update
          SERVICE_ARN=$(eval $UPDATE_CMD --query 'service.serviceArn' --output text)
          
          echo "Service updated: $SERVICE_ARN"
          echo "service_arn=$SERVICE_ARN" >> $GITHUB_OUTPUT

      - name: Wait for Service Stability
        if: inputs.wait_for_stability == true
        run: |
          echo "⏳ Waiting for service stability..."
          
          aws ecs wait services-stable \
            --cluster "${{ inputs.cluster_name }}" \
            --services "${{ inputs.service_name }}" || {
            echo "::error::Service did not stabilize"
            exit 1
          }
          
          echo "✅ Service is stable"

      - name: Verify Deployment
        run: |
          echo "🔍 Verifying deployment..."
          
          CLUSTER="${{ inputs.cluster_name }}"
          SERVICE="${{ inputs.service_name }}"
          
          # Get running tasks
          TASKS=$(aws ecs list-tasks \
            --cluster "$CLUSTER" \
            --service-name "$SERVICE" \
            --desired-status RUNNING \
            --query 'taskArns[]' \
            --output text)
          
          if [[ -z "$TASKS" ]]; then
            echo "::warning::No running tasks found"
          else
            echo "Running tasks:"
            aws ecs describe-tasks \
              --cluster "$CLUSTER" \
              --tasks $TASKS \
              --query 'tasks[].{TaskArn:taskArn,Status:lastStatus,Image:containers[0].image}' \
              --output table
          fi

      - name: Set Result
        id: result
        if: always()
        run: |
          if [[ -n "${{ steps.update.outputs.service_arn }}" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Generate Summary
        if: always()
        run: |
          echo "## 🐳 ECS Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | ${{ inputs.cluster_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ inputs.service_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | ${{ inputs.container_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New Image | \`${{ inputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Task Definition | ${{ steps.register.outputs.task_arn }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.result.outputs.status }}" == "success" ]]; then
            echo "### ✅ Deployment: **SUCCESS**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
