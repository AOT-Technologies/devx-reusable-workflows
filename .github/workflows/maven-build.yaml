name: "Module: Maven Build"
# ------------------------------------------------------------------------------
# Maven build with Unit Tests (run before packaging).
# Uploads directly to Nexus.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing pom.xml"
        type: string
        default: "."
      java_version:
        description: "Java version"
        type: string
        default: "17"
      distribution:
        description: "JDK Distribution"
        type: string
        default: "temurin"
      # --- TEST INPUTS ---
      run_tests:
        description: "Run unit tests?"
        type: boolean
        default: true
      test_script:
        description: "Command to run tests"
        type: string
        default: "mvn test -B"
      # --- BUILD INPUTS ---
      maven_args:
        description: "Maven packaging arguments"
        type: string
        default: "-B clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true -Dlicense.skip=true -Dmaven.antrun.skip=true"
      artifact_path:
        description: "Path to jar/war relative to working_directory."
        type: string
        default: "target/*.jar"
      artifact_name:
        description: "Name of the artifact to upload. If blank, a default name will be used."
        type: string
        default: ""
      
      # --- NEXUS INPUTS ---
      nexus_url:
        description: "Nexus base URL (e.g., https://nexus.company.com)"
        type: string
        required: true
      nexus_repository:
        description: "Target repository (e.g., maven-releases)"
        type: string
        default: "maven-releases"

    secrets:
      NEXUS_USERNAME:
        description: "Nexus username"
        required: false
      NEXUS_PASSWORD:
        description: "Nexus password/token"
        required: false

    outputs:
      # --- NEXUS OUTPUTS ---
      nexus_path:
        description: "Path to artifact in Nexus"
        value: ${{ jobs.build.outputs.nexus_path }}
      artifact_file:
        description: "Artifact filename"
        value: ${{ jobs.build.outputs.artifact_file }}
      group_id:
        description: "Maven group ID"
        value: ${{ jobs.build.outputs.group_id }}
      artifact_id:
        description: "Maven artifact ID"
        value: ${{ jobs.build.outputs.artifact_id }}
      version:
        description: "Maven version"
        value: ${{ jobs.build.outputs.version }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Directory with pom.xml"
        type: string
        default: "."
      java_version:
        description: "Java version"
        type: string
        default: "17"
      distribution:
        description: "JDK distribution"
        type: choice
        options:
          - temurin
          - zulu
          - adopt
          - liberica
        default: "temurin"
      run_tests:
        description: "Run tests"
        type: boolean
        default: true
      test_script:
        description: "Test command"
        type: string
        default: "mvn test -B"
      maven_args:
        description: "Maven build args"
        type: string
        default: "-B clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true -Dlicense.skip=true -Dmaven.antrun.skip=true"
      artifact_path:
        description: "Artifact path"
        type: string
        default: "target/*.jar"

permissions:
  contents: read
  actions: write  # Required for artifact uploads

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    
    outputs:
      nexus_path: ${{ steps.upload_nexus.outputs.path }}
      artifact_file: ${{ steps.detect_artifact.outputs.filename }}
      group_id: ${{ steps.maven_coords.outputs.group_id }}
      artifact_id: ${{ steps.maven_coords.outputs.artifact_id }}
      version: ${{ steps.maven_coords.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Java
        uses: actions/setup-java@v4.2.1
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.distribution }}
          cache: 'maven'
          cache-dependency-path: ${{ inputs.working_directory }}/pom.xml

      # --- UNIT TEST STEP ---
      - name: Run Unit Tests
        if: inputs.run_tests == true
        run: ${{ inputs.test_script }} -f pom.xml

      - name: Build with Maven
        if: inputs.maven_args != 'none' && inputs.maven_args != ''
        run: mvn ${{ inputs.maven_args }} -f pom.xml

      # --- EXTRACT MAVEN COORDINATES ---
      - name: Extract Maven Coordinates
        id: maven_coords
        run: |
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          PACKAGING=$(mvn help:evaluate -Dexpression=project.packaging -q -DforceStdout)
          
          echo "group_id=$GROUP_ID" >> $GITHUB_OUTPUT
          echo "artifact_id=$ARTIFACT_ID" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "packaging=$PACKAGING" >> $GITHUB_OUTPUT
          
          echo "đź“¦ Maven Coordinates:"
          echo "   Group: $GROUP_ID"
          echo "   Artifact: $ARTIFACT_ID"
          echo "   Version: $VERSION"
          echo "   Packaging: $PACKAGING"

      # --- DETECT ACTUAL ARTIFACT FILE ---
      - name: Detect Artifact File
        id: detect_artifact
        run: |
          # Find the actual JAR file (exclude .original files from Spring Boot repackaging)
          shopt -s nullglob
          JAR_FILES=(target/*.jar)
          
          # Filter out .original files
          ACTUAL_JAR=""
          for f in "${JAR_FILES[@]}"; do
            if [[ "$f" != *.original ]]; then
              ACTUAL_JAR="$f"
              break
            fi
          done
          
          if [[ -z "$ACTUAL_JAR" || ! -f "$ACTUAL_JAR" ]]; then
            echo "::error::No JAR file found in target directory"
            ls -la target/
            exit 1
          fi
          
          FILENAME=$(basename "$ACTUAL_JAR")
          echo "fullpath=$ACTUAL_JAR" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "đź“¦ Detected artifact: $FILENAME"

      # --- UPLOAD TO NEXUS ---
      - name: Upload to Nexus
        if: inputs.nexus_url != ''
        id: upload_nexus
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_URL: ${{ inputs.nexus_url }}
          NEXUS_REPO: ${{ inputs.nexus_repository }}
          GROUP_ID: ${{ steps.maven_coords.outputs.group_id }}
          ARTIFACT_ID: ${{ steps.maven_coords.outputs.artifact_id }}
          VERSION: ${{ steps.maven_coords.outputs.version }}
          PACKAGING: ${{ steps.maven_coords.outputs.packaging }}
        run: |
          JAR_FILE="${{ steps.detect_artifact.outputs.fullpath }}"
          
          GROUP_PATH=$(echo "$GROUP_ID" | tr '.' '/')
          
          # CRITICAL: For Maven 2 repositories, the path MUST follow the layout:
          # [groupId path]/[artifactId]/[version]/[artifactId]-[version].[extension]
          REMOTE_FILENAME="${ARTIFACT_ID}-${VERSION}.${PACKAGING}"
          
          ARTIFACT_PATH="${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}/${REMOTE_FILENAME}"
          FULL_URL="${NEXUS_URL}/repository/${NEXUS_REPO}/${ARTIFACT_PATH}"
          
          echo "đź“¤ Uploading to Nexus..."
          echo "   Local File: $JAR_FILE"
          echo "   Remote Path: $ARTIFACT_PATH"
          echo "   URL: $FULL_URL" # URL logged may contain potential credential path | Mask or remove the echo if needed

          # run: |
          #   MASKED_URL=$(echo "$FULL_URL" | sed 's|://[^@]*@|://***:***@|g')
          #   echo "URL: $MASKED_URL"

          # Verify file exists
          if [[ ! -f "$JAR_FILE" ]]; then
            echo "::error::Build artifact not found: $JAR_FILE"
            ls -la target/
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "$JAR_FILE" 2>/dev/null || stat -f%z "$JAR_FILE")
          echo "   Size: $FILE_SIZE bytes"
          
          # Upload to Nexus (using environment variables prevents shell expansion)
          HTTP_STATUS=$(curl -s \
            -u "$NEXUS_USER:$NEXUS_PASS" \
            -X PUT \
            -T "$JAR_FILE" \
            -w "%{http_code}" \
            -o response.txt \
            "$FULL_URL")
          
          echo "   HTTP Status: $HTTP_STATUS"
          
          if [[ "$HTTP_STATUS" -eq 200 || "$HTTP_STATUS" -eq 201 ]]; then
            echo "âś… Upload successful!"
            echo "path=$ARTIFACT_PATH" >> $GITHUB_OUTPUT
            echo "url=$FULL_URL" >> $GITHUB_OUTPUT
            
            # Verify upload
            VERIFY_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "$NEXUS_USER:$NEXUS_PASS" \
              "$FULL_URL")
            
            if [[ "$VERIFY_STATUS" -eq 200 ]]; then
              echo "âś… Artifact verified in Nexus"
            else
              echo "::warning::Could not verify artifact (HTTP $VERIFY_STATUS)"
            fi
          else
            echo "::error::Upload failed with status $HTTP_STATUS"
            if [[ -f response.txt ]]; then
              echo "Response:"
              cat response.txt
            fi
            exit 1
          fi

      - name: Summary
        run: |
          echo "## đź“¦ Maven Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Group ID | ${{ steps.maven_coords.outputs.group_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact ID | ${{ steps.maven_coords.outputs.artifact_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.maven_coords.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Local File | ${{ steps.detect_artifact.outputs.filename }} |" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.upload_nexus.outputs.url }}" ]]; then
            echo "| Remote Path | ${{ steps.upload_nexus.outputs.path }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Nexus URL | ${{ steps.upload_nexus.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          fi