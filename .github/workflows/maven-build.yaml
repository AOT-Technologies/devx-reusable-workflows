name: "Module: Maven Build"
# ------------------------------------------------------------------------------
# Deterministic Maven build with Unit Tests (run before packaging).
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing pom.xml"
        type: string
        default: "."
      java_version:
        description: "Java version"
        type: string
        default: "8" #change to 17 for better stability
      distribution:
        description: "JDK Distribution"
        type: string
        default: "temurin"
      # --- TEST INPUTS ---
      run_tests:
        description: "Run unit tests?"
        type: boolean
        default: true
      test_script:
        description: "Command to run tests"
        type: string
        # We enforce batch mode (-B) to keep logs clean
        default: "mvn test -B"
      # --- BUILD INPUTS ---
      maven_args:
        description: "Maven packaging arguments"
        type: string
        # NOTE: Tests are skipped here because they run in a separate step above.
        # Checkstyle, PMD, and license checks are skipped for build speed.
        # If you need these checks, enable them in your pom.xml or override this input.
        default: "-B clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true -Dlicense.skip=true -Dmaven.antrun.skip=true"
      artifact_path:
        description: "Path to jar/war relative to working_directory. Leave blank to skip."
        type: string
        default: ""

    outputs:
      artifact_name:
        description: "Name of uploaded artifact (empty if no upload)"
        value: ${{ jobs.build.outputs.artifact_name }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Directory with pom.xml"
        type: string
        default: "."
      java_version:
        description: "Java version"
        type: string
        default: "17"
      distribution:
        description: "JDK distribution"
        type: choice
        options:
          - temurin
          - zulu
          - adopt
          - liberica
        default: "temurin"
      run_tests:
        description: "Run tests"
        type: boolean
        default: true
      test_script:
        description: "Test command"
        type: string
        default: "mvn test -B"
      maven_args:
        description: "Maven build args"
        type: string
        default: "-B clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true -Dlicense.skip=true -Dmaven.antrun.skip=true"
      artifact_path:
        description: "Artifact path"
        type: string
        default: ""

permissions:
  contents: read
  actions: write        # Required for upload-artifact

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    
    outputs:
      artifact_name: ${{ steps.set_artifact_name.outputs.artifact_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Java
        uses: actions/setup-java@v4.2.1
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.distribution }}
          cache: 'maven'
          cache-dependency-path: ${{ inputs.working_directory }}/pom.xml

      # --- UNIT TEST STEP ---
      - name: Run Unit Tests
        if: inputs.run_tests == true
        # We run this BEFORE packaging to catch errors early
        run: ${{ inputs.test_script }} -f pom.xml

      # Added test results capture
      - name: Upload Test Results
        if: always() && inputs.run_tests == true
        uses: actions/upload-artifact@v4.3.1
        with:
          name: maven-test-results-${{ github.sha }}
          path: |
            ${{ inputs.working_directory }}/target/surefire-reports/
            ${{ inputs.working_directory }}/target/failsafe-reports/
            ${{ inputs.working_directory }}/target/site/jacoco/
          retention-days: 30
          if-no-files-found: ignore

      - name: Build with Maven
        run: mvn ${{ inputs.maven_args }} -f pom.xml

      - name: Upload Build Artifact
        if: inputs.artifact_path != ''
        uses: actions/upload-artifact@v4.3.1
        with:
          name: maven-build-${{ github.sha }}
          path: ${{ inputs.working_directory }}/${{ inputs.artifact_path }}
          retention-days: 90

      - name: Set Artifact Name Output
        id: set_artifact_name
        run: |
          if [[ -n "${{ inputs.artifact_path }}" ]]; then
            echo "artifact_name=maven-build-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "artifact_name=" >> $GITHUB_OUTPUT
          fi