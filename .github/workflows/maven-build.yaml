name: "Module: Maven Build"
# ------------------------------------------------------------------------------
# Deterministic Maven build with Unit Tests (run before packaging).
# Uploads directly to Artifactory.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing pom.xml"
        type: string
        default: "."
      java_version:
        description: "Java version"
        type: string
        default: "17"
      distribution:
        description: "JDK Distribution"
        type: string
        default: "temurin"
      # --- TEST INPUTS ---
      run_tests:
        description: "Run unit tests?"
        type: boolean
        default: true
      test_script:
        description: "Command to run tests"
        type: string
        # We enforce batch mode (-B) to keep logs clean
        default: "mvn test -B"
      # --- BUILD INPUTS ---
      maven_args:
        description: "Maven packaging arguments"
        type: string
        # NOTE: Tests are skipped here because they run in a separate step above.
        # Checkstyle, PMD, and license checks are skipped for build speed.
        # If you need these checks, enable them in your pom.xml or override this input.
        default: "-B clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true -Dlicense.skip=true -Dmaven.antrun.skip=true"
      artifact_path:
        description: "Path to jar/war relative to working_directory."
        type: string
        default: "target/*.jar"
      artifact_name:
        description: "Name of the artifact to upload. If blank, a default name will be used."
        type: string
        default: ""
      
      # --- ARTIFACTORY INPUTS ---
      artifactory_url:
        description: "Artifactory base URL (e.g., https://company.jfrog.io/artifactory)"
        type: string
        required: true
      artifactory_repository:
        description: "Target repository (e.g., libs-snapshot-local)"
        type: string
        default: "libs-snapshot-local"

    secrets:
      ARTIFACTORY_USER:
        description: "Artifactory username"
        required: false
      ARTIFACTORY_TOKEN:
        description: "Artifactory API token"
        required: false

    outputs:
      # --- ARTIFACTORY OUTPUTS ---
      artifactory_path:
        description: "Path to artifact in Artifactory"
        value: ${{ jobs.build.outputs.artifactory_path }}
      artifact_file:
        description: "Artifact filename"
        value: ${{ jobs.build.outputs.artifact_file }}
      group_id:
        description: "Maven group ID"
        value: ${{ jobs.build.outputs.group_id }}
      artifact_id:
        description: "Maven artifact ID"
        value: ${{ jobs.build.outputs.artifact_id }}
      version:
        description: "Maven version"
        value: ${{ jobs.build.outputs.version }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Directory with pom.xml"
        type: string
        default: "."
      java_version:
        description: "Java version"
        type: string
        default: "17"
      distribution:
        description: "JDK distribution"
        type: choice
        options:
          - temurin
          - zulu
          - adopt
          - liberica
        default: "temurin"
      run_tests:
        description: "Run tests"
        type: boolean
        default: true
      test_script:
        description: "Test command"
        type: string
        default: "mvn test -B"
      maven_args:
        description: "Maven build args"
        type: string
        default: "-B clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true -Dlicense.skip=true -Dmaven.antrun.skip=true"
      artifact_path:
        description: "Artifact path"
        type: string
        default: "target/*.jar"

permissions:
  contents: read
  actions: write        # Required for upload-artifact

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    
    outputs:
      artifactory_path: ${{ steps.upload_artifactory.outputs.path }}
      artifact_file: ${{ steps.maven_coords.outputs.filename }}
      group_id: ${{ steps.maven_coords.outputs.group_id }}
      artifact_id: ${{ steps.maven_coords.outputs.artifact_id }}
      version: ${{ steps.maven_coords.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Java
        uses: actions/setup-java@v4.2.1
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.distribution }}
          cache: 'maven'
          cache-dependency-path: ${{ inputs.working_directory }}/pom.xml

      # --- UNIT TEST STEP ---
      - name: Run Unit Tests
        if: inputs.run_tests == true
        # We run this BEFORE packaging to catch errors early
        run: ${{ inputs.test_script }} -f pom.xml

      # Added test results capture
      - name: Upload Test Results
        if: always() && inputs.run_tests == true
        uses: actions/upload-artifact@v4.3.1
        with:
          name: maven-test-results-${{ github.sha }}
          path: |
            ${{ inputs.working_directory }}/target/surefire-reports/
            ${{ inputs.working_directory }}/target/failsafe-reports/
            ${{ inputs.working_directory }}/target/site/jacoco/
          retention-days: 30
          if-no-files-found: ignore

      - name: Build with Maven
        if: inputs.maven_args != 'none' && inputs.maven_args != ''
        run: mvn ${{ inputs.maven_args }} -f pom.xml

      # --- EXTRACT MAVEN COORDINATES (NEW) ---
      - name: Extract Maven Coordinates
        id: maven_coords
        run: |
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          PACKAGING=$(mvn help:evaluate -Dexpression=project.packaging -q -DforceStdout)
          
          FILENAME="${ARTIFACT_ID}-${VERSION}.${PACKAGING}"
          
          echo "group_id=$GROUP_ID" >> $GITHUB_OUTPUT
          echo "artifact_id=$ARTIFACT_ID" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "packaging=$PACKAGING" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          
          echo "📦 Built: $FILENAME"
          echo "   Group: $GROUP_ID"
          echo "   Artifact: $ARTIFACT_ID"
          echo "   Version: $VERSION"

      # --- UPLOAD TO ARTIFACTORY ---
      - name: Upload to Artifactory
        if: inputs.artifact_path != ''
        id: upload_artifactory
        run: |
          GROUP_PATH=$(echo "${{ steps.maven_coords.outputs.group_id }}" | tr '.' '/')
          ARTIFACT_PATH="${GROUP_PATH}/${{ steps.maven_coords.outputs.artifact_id }}/${{ steps.maven_coords.outputs.version }}/${{ steps.maven_coords.outputs.filename }}"
          FULL_URL="${{ inputs.artifactory_url }}/${{ inputs.artifactory_repository }}/${ARTIFACT_PATH}"
          
          echo "📤 Uploading to Artifactory..."
          echo "URL: $FULL_URL"
          
          # Calculate checksums
          JAR_FILE="target/${{ steps.maven_coords.outputs.filename }}"
          
          if [[ ! -f "$JAR_FILE" ]]; then
            echo "::error::Build artifact not found: $JAR_FILE"
            ls -la target/
            exit 1
          fi
          
          SHA256=$(sha256sum "$JAR_FILE" | awk '{print $1}')
          SHA1=$(sha1sum "$JAR_FILE" | awk '{print $1}')
          MD5=$(md5sum "$JAR_FILE" | awk '{print $1}')
          
          echo "Checksums calculated:"
          echo "  SHA256: $SHA256"
          echo "  SHA1: $SHA1"
          echo "  MD5: $MD5"
          
          # Upload with checksums and metadata
          HTTP_STATUS=$(curl -s \
            -u '${{ secrets.ARTIFACTORY_USER }}:${{ secrets.ARTIFACTORY_TOKEN }}' \
            -H "X-Checksum-Sha256: ${SHA256}" \
            -H "X-Checksum-Sha1: ${SHA1}" \
            -H "X-Checksum-Md5: ${MD5}" \
            -H "X-Artifactory-Properties: build.number=${{ github.run_number }};vcs.revision=${{ github.sha }};build.name=${{ github.workflow }}" \
            -X PUT \
            -T "$JAR_FILE" \
            -w "%{http_code}" \
            -o response.txt \
            "$FULL_URL")
          
          echo "HTTP Status: $HTTP_STATUS"
          
          if [[ "$HTTP_STATUS" -eq 200 || "$HTTP_STATUS" -eq 201 ]]; then
            echo "✅ Upload successful!"
            echo "path=$ARTIFACT_PATH" >> $GITHUB_OUTPUT
            echo "url=$FULL_URL" >> $GITHUB_OUTPUT
            
            # Verify upload
            VERIFY_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -u '${{ secrets.ARTIFACTORY_USER }}:${{ secrets.ARTIFACTORY_TOKEN }}' \
              "$FULL_URL")
            
            if [[ "$VERIFY_STATUS" -eq 200 ]]; then
              echo "✅ Artifact verified in Artifactory"
            else
              echo "::warning::Could not verify artifact (HTTP $VERIFY_STATUS)"
            fi
          else
            echo "::error::Upload failed with status $HTTP_STATUS"
            if [[ -f response.txt ]]; then
              echo "Response:"
              cat response.txt
            fi
            exit 1
          fi