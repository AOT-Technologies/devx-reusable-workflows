name: "Module: SAST Scan (Semgrep)"
# ------------------------------------------------------------------------------
# Static Application Security Testing (SAST) using Semgrep.
#
# GUARANTEES:
# - Deterministic execution
# - No cloud dependency
# - Policy-driven fail-fast
# - SARIF reporting
#
# POLICY GATE:
# - fail_on_findings = true  → pipeline fails on findings
# - fail_on_findings = false → audit mode (report only)
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      scan_path:
        description: "Path to source code"
        type: string
        default: "."
      exclude_paths:
        description: "Paths to exclude (e.g., tests/,vendor/,node_modules/)"
        type: string
        default: ""
      ruleset:
        description: "Semgrep ruleset (p/ci, p/default, p/owasp-top-ten)"
        type: string
        default: "p/ci"
      severity_threshold:
        description: "Minimum severity to report (INFO | WARNING | ERROR)"
        type: string
        default: "ERROR"
      fail_on_findings:
        description: "Fail pipeline if violations are found"
        type: boolean
        default: true
      upload_sarif:
        description: "Upload SARIF to GitHub Security tab"
        type: boolean
        default: true
  
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      scan_path:
        description: "Path to source code"
        type: string
        default: "."
      exclude_paths:
        description: "Paths to exclude"
        type: string
        default: ""
      ruleset:
        description: "Semgrep ruleset"
        type: string
        default: "p/ci"
      severity_threshold:
        description: "Minimum severity"
        type: choice
        options:
          - INFO
          - WARNING
          - ERROR
        default: "ERROR"
      fail_on_findings:
        description: "Fail on findings"
        type: boolean
        default: true
      upload_sarif:
        description: "Upload SARIF"
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write
  actions: read  # Required for workflow telemetry

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      # ------------------------------------------------------------------------
      # SETUP
      # ------------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      # ------------------------------------------------------------------------
      # EXECUTION
      # ------------------------------------------------------------------------
      - name: Run Semgrep SAST
        id: semgrep
        timeout-minutes: 15
        continue-on-error: ${{ inputs.fail_on_findings == false }}
        run: |
          echo "🔍 Running Semgrep SAST scan..."
          echo "Config: ${{ inputs.ruleset }}"
          echo "Severity: ${{ inputs.severity_threshold }}"
          echo "Scan path: ${{ inputs.scan_path }}"
          
          # Build exclude flags
          EXCLUDE_FLAGS=""
          if [ -n "${{ inputs.exclude_paths }}" ]; then
            IFS=',' read -ra EXCLUDES <<< "${{ inputs.exclude_paths }}"
            for exclude in "${EXCLUDES[@]}"; do
              exclude=$(echo "$exclude" | xargs)  # Trim whitespace
              if [ -n "$exclude" ]; then
                EXCLUDE_FLAGS="$EXCLUDE_FLAGS --exclude $exclude"
              fi
            done
            echo "Excluding: ${{ inputs.exclude_paths }}"
          fi

          # Map severity threshold to Semgrep format
          SEVERITY_FLAG=""
          case "${{ inputs.severity_threshold }}" in
            ERROR)
              SEVERITY_FLAG="--severity=ERROR"
              ;;
            WARNING)
              SEVERITY_FLAG="--severity=WARNING --severity=ERROR"
              ;;
            INFO)
              SEVERITY_FLAG="--severity=INFO --severity=WARNING --severity=ERROR"
              ;;
          esac

          # Run Semgrep and generate SARIF
          EXIT_CODE=0
          semgrep scan \
            --config=${{ inputs.ruleset }} \
            $SEVERITY_FLAG \
            $EXCLUDE_FLAGS \
            --sarif \
            --output=semgrep.sarif \
            ${{ inputs.scan_path }} || EXIT_CODE=$?

          # Also output to console for visibility
          echo ""
          echo "📊 Scan Results:"
          semgrep scan \
            --config=${{ inputs.ruleset }} \
            $SEVERITY_FLAG \
            $EXCLUDE_FLAGS \
            ${{ inputs.scan_path }} || true

          # Handle exit code based on policy
          if [ $EXIT_CODE -ne 0 ]; then
            if [ "${{ inputs.fail_on_findings }}" == "true" ]; then
              echo "::error::❌ Semgrep found security issues (severity: ${{ inputs.severity_threshold }})"
              echo "::error::Review findings in the Security tab or check the logs above"
              exit $EXIT_CODE
            else
              echo "::warning::⚠️ Semgrep found issues but fail_on_findings is false (audit mode)"
              exit 0
            fi
          else
            echo "✅ No security issues found"
          fi

      # ------------------------------------------------------------------------
      # REPORTING
      # ------------------------------------------------------------------------
      - name: Upload SARIF to Security Tab
        if: inputs.upload_sarif == true && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: sast-semgrep