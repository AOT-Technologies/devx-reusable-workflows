name: "Module: SAST Scan (Semgrep)"
# ------------------------------------------------------------------------------
# Static Application Security Testing (SAST) using Semgrep.
#
# GUARANTEES:
# - Deterministic execution
# - No cloud dependency
# - Policy-driven fail-fast
# - SARIF reporting
#
# Conditions:
# - Code Security must be enabled for this repository to use code scanning (Code Security features are free for public repositories and billed for per 90-day active committer for private and internal repositories)
#
# POLICY GATE:
# - fail_on_findings = true  → pipeline fails on findings
# - fail_on_findings = false → audit mode (report only)
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      scan_path:
        description: "Path to source code"
        type: string
        default: "."
      exclude_paths:
        description: "Paths to exclude (e.g., tests/,vendor/,node_modules/)"
        type: string
        default: ""
      ruleset:
        description: "Semgrep ruleset (p/ci, p/default, p/owasp-top-ten)"
        type: string
        default: "p/ci"
      severity_threshold:
        description: "Minimum severity to report (INFO | WARNING | ERROR)"
        type: string
        default: "ERROR"
      fail_on_findings:
        description: "Fail pipeline if violations are found"
        type: boolean
        default: true
      upload_sarif:
        description: "Upload SARIF to GitHub Security tab"
        type: boolean
        default: true
  
  workflow_dispatch:
    inputs:
      scan_path:
        description: "Path to source code"
        type: string
        default: "."
      exclude_paths:
        description: "Paths to exclude"
        type: string
        default: ""
      ruleset:
        description: "Semgrep ruleset"
        type: string
        default: "p/ci"
      severity_threshold:
        description: "Minimum severity"
        type: choice
        options:
          - INFO
          - WARNING
          - ERROR
        default: "ERROR"
      fail_on_findings:
        description: "Fail on findings"
        type: boolean
        default: true
      upload_sarif:
        description: "Upload SARIF"
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep SAST
        id: semgrep
        timeout-minutes: 15
        run: |
          echo "🔍 Running Semgrep SAST scan..."
          echo "Config: ${{ inputs.ruleset }}"
          echo "Severity: ${{ inputs.severity_threshold }}"
          echo "Scan path: ${{ inputs.scan_path }}"
          echo "Working directory: $(pwd)"
          
          # Build exclude flags
          EXCLUDE_FLAGS=""
          if [ -n "${{ inputs.exclude_paths }}" ]; then
            IFS=',' read -ra EXCLUDES <<< "${{ inputs.exclude_paths }}"
            for exclude in "${EXCLUDES[@]}"; do
              exclude=$(echo "$exclude" | xargs)
              if [ -n "$exclude" ]; then
                EXCLUDE_FLAGS="$EXCLUDE_FLAGS --exclude $exclude"
              fi
            done
            echo "Excluding: ${{ inputs.exclude_paths }}"
          fi

          # Map severity threshold
          SEVERITY_FLAG=""
          case "${{ inputs.severity_threshold }}" in
            ERROR)
              SEVERITY_FLAG="--severity=ERROR"
              ;;
            WARNING)
              SEVERITY_FLAG="--severity=WARNING --severity=ERROR"
              ;;
            INFO)
              SEVERITY_FLAG="--severity=INFO --severity=WARNING --severity=ERROR"
              ;;
          esac

          # Run Semgrep (always generate SARIF, even on error)
          EXIT_CODE=0
          semgrep scan \
            --config=${{ inputs.ruleset }} \
            $SEVERITY_FLAG \
            $EXCLUDE_FLAGS \
            --sarif \
            --output=semgrep.sarif \
            ${{ inputs.scan_path }} || EXIT_CODE=$?

          # Verify SARIF was created
          if [ ! -f "semgrep.sarif" ]; then
            echo "::warning::SARIF file was not generated by Semgrep, creating empty one..."
            cat > semgrep.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "Semgrep",
                    "informationUri": "https://semgrep.dev",
                    "semanticVersion": "1.0.0",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF
          else
            echo "✅ SARIF file generated: $(ls -lh semgrep.sarif)"
          fi

          # Console output for visibility
          echo ""
          echo "📊 Scan Results:"
          semgrep scan \
            --config=${{ inputs.ruleset }} \
            $SEVERITY_FLAG \
            $EXCLUDE_FLAGS \
            ${{ inputs.scan_path }} || true

          # Handle exit code
          if [ $EXIT_CODE -ne 0 ]; then
            if [ "${{ inputs.fail_on_findings }}" == "true" ]; then
              echo "::error::❌ Semgrep found security issues (severity: ${{ inputs.severity_threshold }})"
              echo "EXIT_WITH_ERROR=true" >> $GITHUB_ENV
            else
              echo "::warning::⚠️ Semgrep found issues but fail_on_findings is false (audit mode)"
            fi
          else
            echo "✅ No security issues found"
          fi

      - name: Upload SARIF to Security Tab
        if: inputs.upload_sarif == true && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: sast-semgrep

      - name: Fail Job If Needed
        if: env.EXIT_WITH_ERROR == 'true'
        run: |
          echo "::error::Failing job due to security findings"
          exit 1