name: "Cache Setup - Unified Dependency & Layer Cache"

# This reusable workflow installs dependencies and caches them for Node, Python, Maven, and Docker Buildx. Must run install + cache in the same job (GitHub runner resets per job). All actions are version-pinned for governance and deterministic builds. This workflow is designed to be called by top-level CI orchestrators (node-ci, python-ci, maven-ci, etc).

permissions:
  contents: read

on:
  workflow_call:
    inputs:

      language:
        description: "node | python | maven"
        required: true
        type: string

      working_directory:
        description: "Directory containing the project"
        type: string
        default: "."
        
    outputs:
      node_cache_hit:    { value: "${{ jobs.cache.outputs.node_cache_hit }}" }
      python_cache_hit:  { value: "${{ jobs.cache.outputs.python_cache_hit }}" }
      maven_cache_hit:   { value: "${{ jobs.cache.outputs.maven_cache_hit }}" }

jobs:
  cache:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    outputs:
      node_cache_hit:    ${{ steps.node_cache.outputs.cache-hit }}
      python_cache_hit:  ${{ steps.python_cache.outputs.cache-hit }}
      maven_cache_hit:   ${{ steps.maven_cache.outputs.cache-hit }}

    steps:
      # -------------------------------------------------------------
      # 1. CHECKOUT THE REPO
      # -------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------
      # 2. NODE.JS (install + cache)
      # -------------------------------------------------------------
      - name: Setup Node
        if: inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        if: inputs.language == 'node'
        run: npm install

      - name: Cache Node dependencies
        if: inputs.language == 'node'
        id: node_cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-

      # -------------------------------------------------------------
      # 3. PYTHON (install + cache)
      # -------------------------------------------------------------
      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        if: inputs.language == 'python'
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Cache Python packages
        if: inputs.language == 'python'
        id: python_cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            venv
          key: python-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            python-${{ runner.os }}-

      # -------------------------------------------------------------
      # 4. MAVEN (install + cache)
      # -------------------------------------------------------------
      - name: Setup Java
        if: inputs.language == 'maven'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Maven repository
        if: inputs.language == 'maven'
        id: maven_cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Build Maven project
        if: inputs.language == 'maven'
        run: mvn -B package --file pom.xml