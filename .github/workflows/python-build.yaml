name: "Module: Python Build"
# ------------------------------------------------------------------------------
# Python build with pip caching, unit tests, artifact upload.
# Uploads directly to Nexus
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing requirements.txt"
        type: string
        default: "."
      python_version:
        type: string
        default: "3.11"
      install_command:
        description: "Command to install dependencies"
        type: string
        default: "pip install -r requirements.txt"
      # --- TEST INPUTS ---
      run_tests:
        description: "Run unit tests?"
        type: boolean
        default: true
      test_script:
        description: "Script to run tests"
        type: string
        default: "python -m pytest"
      # --- BUILD INPUTS ---
      build_command:
        description: "Command to build/package (optional)"
        type: string
        default: ""
      artifact_path:
        description: "Directory/File to upload. Leave blank to skip."
        type: string
        default: ""
      artifact_name:
        description: "Name of the artifact to upload. If blank, a default name will be used."
        type: string
        default: ""
      
      # --- NEXUS INPUTS ---
      nexus_url:
        description: "Nexus base URL (e.g., https://nexus.company.com)"
        type: string
        required: true
      nexus_repository:
        description: "Target repository (e.g., raw-releases)"
        type: string
        default: "raw-releases"
      nexus_repo_type:
        description: "Type of Nexus repository: 'raw' or 'pypi'"
        type: string
        default: "raw"
      nexus_path:
        description: "Custom upload path in Nexus (e.g., package/1.0.0/package.whl)"
        type: string
        default: ""

    secrets:
      NEXUS_USERNAME:
        description: "Nexus username"
        required: false
      NEXUS_PASSWORD:
        description: "Nexus password/token"
        required: false

    outputs:
      # --- NEXUS OUTPUTS ---
      nexus_path:
        description: "Path to artifact in Nexus"
        value: ${{ jobs.build.outputs.nexus_upload_path }}
      artifact_file:
        description: "Artifact filename"
        value: ${{ jobs.build.outputs.artifact_file }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Working directory"
        type: string
        default: "."
      python_version:
        description: "Python version"
        type: string
        default: "3.11"
      install_command:
        description: "Install command"
        type: string
        default: "pip install -r requirements.txt"
      run_tests:
        description: "Run tests"
        type: boolean
        default: true
      test_script:
        description: "Test script"
        type: string
        default: "python -m pytest"
      build_command:
        description: "Build command"
        type: string
        default: ""
      artifact_path:
        description: "Artifact path"
        type: string
        default: ""
      nexus_url:
        description: "Nexus URL"
        type: string
        required: true
      nexus_repository:
        description: "Nexus Repository"
        type: string
        default: "raw-releases"
      nexus_repo_type:
        description: "Nexus Repo Type"
        type: choice
        options:
          - raw
          - pypi
        default: "raw"

permissions:
  contents: read
  actions: write        # Required for upload-artifact

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    
    outputs:
      nexus_upload_path: ${{ steps.upload_nexus.outputs.path }}
      artifact_file: ${{ steps.detect_artifact.outputs.filename }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      # ------------------------------------------------------------------------
      # SETUP & CACHE
      # ------------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'
          cache-dependency-path: ${{ inputs.working_directory }}/requirements.txt

      # ------------------------------------------------------------------------
      # INSTALL
      # ------------------------------------------------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.install_command }}

      # --- UNIT TEST STEP ---
      - name: Run Unit Tests
        if: inputs.run_tests == true
        run: ${{ inputs.test_script }}

      # Added test results capture
      - name: Upload Test Results
        if: always() && inputs.run_tests == true
        uses: actions/upload-artifact@v4.3.1
        with:
          name: python-test-results-${{ github.sha }}
          path: |
            ${{ inputs.working_directory }}/.coverage
            ${{ inputs.working_directory }}/coverage.xml
            ${{ inputs.working_directory }}/htmlcov/
            ${{ inputs.working_directory }}/test-results/
            ${{ inputs.working_directory }}/junit.xml
          retention-days: 30
          if-no-files-found: ignore

      # ------------------------------------------------------------------------
      # BUILD
      # ------------------------------------------------------------------------
      - name: Build Application
        if: inputs.build_command != ''
        env:
          BUILD_CMD: ${{ inputs.build_command }}
        run: |
          # Security: Validate build_command doesn't contain dangerous characters
          if [[ "$BUILD_CMD" =~ [\$\`] ]]; then
            echo "::error::Invalid characters detected in build_command (potential injection)"
            exit 1
          fi
          eval "$BUILD_CMD"

      # --- DETECT ARTIFACT FILE ---
      - name: Detect Artifact File
        if: inputs.artifact_path != ''
        id: detect_artifact
        run: |
          # Find the actual file from artifact_path pattern
          shopt -s nullglob
          ARTIFACT_FILES=(${{ inputs.artifact_path }})
          
          if [[ ${#ARTIFACT_FILES[@]} -eq 0 ]]; then
            echo "::error::No files found matching pattern: ${{ inputs.artifact_path }}"
            exit 1
          fi
          
          # Use first file if multiple match
          ARTIFACT_FILE="${ARTIFACT_FILES[0]}"
          FILENAME=$(basename "$ARTIFACT_FILE")
          
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "fullpath=$ARTIFACT_FILE" >> $GITHUB_OUTPUT
          echo "📦 Detected artifact: $FILENAME"

      # --- UPLOAD TO NEXUS ---
      - name: Upload to Nexus
        if: inputs.artifact_path != '' && inputs.nexus_url != ''
        id: upload_nexus
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_URL: ${{ inputs.nexus_url }}
          NEXUS_REPO: ${{ inputs.nexus_repository }}
          NEXUS_PATH: ${{ inputs.nexus_path }}
          NEXUS_REPO_TYPE: ${{ inputs.nexus_repo_type }}
        run: |
          ARTIFACT_FILE="${{ steps.detect_artifact.outputs.fullpath }}"
          
          if [[ "$NEXUS_REPO_TYPE" == "pypi" ]]; then
            echo "📤 Uploading to PyPI repository using twine..."
            
            # Install twine with pinned version for reproducibility
            pip install twine || {
              echo "::error::Failed to install twine"
              exit 1
            }
            
            # Construct PyPI URL
            # Nexus PyPI URL format: [nexus-url]/repository/[repo-name]/
            PYPI_URL="${NEXUS_URL}/repository/${NEXUS_REPO}/"
            
            # Upload using twine
            # We use environment variables for authentication
            TWINE_USERNAME="$NEXUS_USER" \
            TWINE_PASSWORD="$NEXUS_PASS" \
            TWINE_REPOSITORY_URL="$PYPI_URL" \
            twine upload "$ARTIFACT_FILE"
            
            # Construct the download path for docker-build.yaml
            # For Nexus PyPI, the path is usually: packages/[package-name]/[version]/[filename]
            # We can extract package name and version from the filename or setup.py
            # For now, we'll try to extract it from the wheel filename
            # Example: demo_python_app-1.0.0-py3-none-any.whl -> packages/demo-python-app/1.0.0/demo_python_app-1.0.0-py3-none-any.whl
            
            FILENAME=$(basename "$ARTIFACT_FILE")
            # demo_python_app-1.0.0-py3-none-any.whl -> demo_python_app
            PKG_NAME=$(echo "$FILENAME" | cut -d'-' -f1 | tr '_' '-')
            # demo_python_app-1.0.0-py3-none-any.whl -> 1.0.0
            PKG_VERSION=$(echo "$FILENAME" | cut -d'-' -f2)
            
            UPLOAD_PATH="packages/${PKG_NAME}/${PKG_VERSION}/${FILENAME}"
            
            echo "path=$UPLOAD_PATH" >> $GITHUB_OUTPUT
            echo "✅ Published successfully to PyPI registry"
            
          else
            echo "📤 Uploading to RAW repository..."
            
            # Determine upload path
            if [[ -n "$NEXUS_PATH" ]]; then
              UPLOAD_PATH="$NEXUS_PATH"
            else
              # Default: use filename in generic path
              UPLOAD_PATH="generic/${{ steps.detect_artifact.outputs.filename }}"
            fi
            
            FULL_URL="${NEXUS_URL}/repository/${NEXUS_REPO}/${UPLOAD_PATH}"
            
            echo "File: $ARTIFACT_FILE"
            echo "URL: $FULL_URL"
            
            # Verify file exists
            if [[ ! -f "$ARTIFACT_FILE" ]]; then
              echo "::error::Build artifact not found: $ARTIFACT_FILE"
              exit 1
            fi
            
            # Upload to Nexus (using environment variables prevents shell expansion)
            HTTP_STATUS=$(curl -s \
              -u "$NEXUS_USER:$NEXUS_PASS" \
              -X PUT \
              -T "$ARTIFACT_FILE" \
              -w "%{http_code}" \
              -o response.txt \
              "$FULL_URL")
            
            if [[ "$HTTP_STATUS" -eq 200 || "$HTTP_STATUS" -eq 201 ]]; then
              echo "✅ Upload successful!"
              echo "path=$UPLOAD_PATH" >> $GITHUB_OUTPUT
              echo "url=$FULL_URL" >> $GITHUB_OUTPUT
              
              # Verify upload
              VERIFY_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -u "$NEXUS_USER:$NEXUS_PASS" \
                "$FULL_URL")
              
              if [[ "$VERIFY_STATUS" -eq 200 ]]; then
                echo "✅ Artifact verified in Nexus"
              else
                echo "::warning::Could not verify artifact (HTTP $VERIFY_STATUS)"
              fi
            else
              echo "::error::Upload failed with status $HTTP_STATUS"
              cat response.txt
              exit 1
            fi
          fi