name: "Module: Python Build"
# ------------------------------------------------------------------------------
# Deterministic Python build with pip caching, unit tests, artifact upload.
# Uploads directly to Artifactory (enterprise mode) or GitHub Artifacts (legacy mode).
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing requirements.txt"
        type: string
        default: "."
      python_version:
        type: string
        default: "3.11"
      install_command:
        description: "Command to install dependencies"
        type: string
        default: "pip install -r requirements.txt"
      # --- TEST INPUTS ---
      run_tests:
        description: "Run unit tests?"
        type: boolean
        default: true
      test_script:
        description: "Script to run tests"
        type: string
        default: "python -m pytest"
      # --- BUILD INPUTS ---
      build_command:
        description: "Command to build/package (optional)"
        type: string
        default: ""
      artifact_path:
        description: "Directory/File to upload. Leave blank to skip."
        type: string
        default: ""
      artifact_name:
        description: "Name of the artifact to upload. If blank, a default name will be used."
        type: string
        default: ""
      
      # --- ARTIFACTORY INPUTS ---
      artifactory_url:
        description: "Artifactory base URL (e.g., https://company.jfrog.io/artifactory)"
        type: string
        required: true
      artifactory_repository:
        description: "Target repository (e.g., pypi-local)"
        type: string
        default: "pypi-local"
      artifactory_path:
        description: "Custom upload path in Artifactory (e.g., package/1.0.0/package.whl)"
        type: string
        default: ""

    secrets:
      ARTIFACTORY_USER:
        description: "Artifactory username"
        required: false
      ARTIFACTORY_TOKEN:
        description: "Artifactory API token"
        required: false

    outputs:
      # --- ARTIFACTORY OUTPUTS ---
      artifactory_path:
        description: "Path to artifact in Artifactory"
        value: ${{ jobs.build.outputs.artifactory_upload_path }}
      artifact_file:
        description: "Artifact filename"
        value: ${{ jobs.build.outputs.artifact_file }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Working directory"
        type: string
        default: "."
      python_version:
        description: "Python version"
        type: string
        default: "3.11"
      install_command:
        description: "Install command"
        type: string
        default: "pip install -r requirements.txt"
      run_tests:
        description: "Run tests"
        type: boolean
        default: true
      test_script:
        description: "Test script"
        type: string
        default: "python -m pytest"
      build_command:
        description: "Build command"
        type: string
        default: ""
      artifact_path:
        description: "Artifact path"
        type: string
        default: ""
      upload_to_artifactory:
        description: "Upload to Artifactory"
        type: boolean
        default: false

permissions:
  contents: read
  actions: write        # Required for upload-artifact

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    
    outputs:
      artifactory_upload_path: ${{ steps.upload_artifactory.outputs.path }}
      artifact_file: ${{ steps.detect_artifact.outputs.filename }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      # ------------------------------------------------------------------------
      # SETUP & CACHE
      # ------------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'
          cache-dependency-path: ${{ inputs.working_directory }}/requirements.txt

      # ------------------------------------------------------------------------
      # INSTALL
      # ------------------------------------------------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.install_command }}

      # --- UNIT TEST STEP ---
      - name: Run Unit Tests
        if: inputs.run_tests == true
        run: ${{ inputs.test_script }}

      # Added test results capture
      - name: Upload Test Results
        if: always() && inputs.run_tests == true
        uses: actions/upload-artifact@v4.3.1
        with:
          name: python-test-results-${{ github.sha }}
          path: |
            ${{ inputs.working_directory }}/.coverage
            ${{ inputs.working_directory }}/coverage.xml
            ${{ inputs.working_directory }}/htmlcov/
            ${{ inputs.working_directory }}/test-results/
            ${{ inputs.working_directory }}/junit.xml
          retention-days: 30
          if-no-files-found: ignore

      # ------------------------------------------------------------------------
      # BUILD
      # ------------------------------------------------------------------------
      - name: Build Application
        if: inputs.build_command != ''
        run: ${{ inputs.build_command }}

      # --- DETECT ARTIFACT FILE (NEW) ---
      - name: Detect Artifact File
        if: inputs.artifact_path != ''
        id: detect_artifact
        run: |
          # Find the actual file from artifact_path pattern
          shopt -s nullglob
          ARTIFACT_FILES=(${{ inputs.artifact_path }})
          
          if [[ ${#ARTIFACT_FILES[@]} -eq 0 ]]; then
            echo "::error::No files found matching pattern: ${{ inputs.artifact_path }}"
            exit 1
          fi
          
          # Use first file if multiple match
          ARTIFACT_FILE="${ARTIFACT_FILES[0]}"
          FILENAME=$(basename "$ARTIFACT_FILE")
          
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "fullpath=$ARTIFACT_FILE" >> $GITHUB_OUTPUT
          echo "📦 Detected artifact: $FILENAME"

      # --- UPLOAD TO ARTIFACTORY ---
      - name: Upload to Artifactory
        if: inputs.artifact_path != ''
        id: upload_artifactory
        run: |
          ARTIFACT_FILE="${{ steps.detect_artifact.outputs.fullpath }}"
          
          # Determine upload path
          if [[ -n "${{ inputs.artifactory_path }}" ]]; then
            UPLOAD_PATH="${{ inputs.artifactory_path }}"
          else
            # Default: use filename in generic path
            UPLOAD_PATH="generic/${{ steps.detect_artifact.outputs.filename }}"
          fi
          
          FULL_URL="${{ inputs.artifactory_url }}/${{ inputs.artifactory_repository }}/${UPLOAD_PATH}"
          
          echo "📤 Uploading to Artifactory..."
          echo "File: $ARTIFACT_FILE"
          echo "URL: $FULL_URL"
          
          # Verify file exists
          if [[ ! -f "$ARTIFACT_FILE" ]]; then
            echo "::error::Build artifact not found: $ARTIFACT_FILE"
            exit 1
          fi
          
          # Calculate checksums
          SHA256=$(sha256sum "$ARTIFACT_FILE" | awk '{print $1}')
          SHA1=$(sha1sum "$ARTIFACT_FILE" | awk '{print $1}')
          MD5=$(md5sum "$ARTIFACT_FILE" | awk '{print $1}')
          
          # Upload
          HTTP_STATUS=$(curl -s \
            -u '${{ secrets.ARTIFACTORY_USER }}:${{ secrets.ARTIFACTORY_TOKEN }}' \
            -H "X-Checksum-Sha256: ${SHA256}" \
            -H "X-Checksum-Sha1: ${SHA1}" \
            -H "X-Checksum-Md5: ${MD5}" \
            -H "X-Artifactory-Properties: build.number=${{ github.run_number }};vcs.revision=${{ github.sha }}" \
            -X PUT \
            -T "$ARTIFACT_FILE" \
            -w "%{http_code}" \
            -o response.txt \
            "$FULL_URL")
          
          if [[ "$HTTP_STATUS" -eq 200 || "$HTTP_STATUS" -eq 201 ]]; then
            echo "✅ Upload successful!"
            echo "path=$UPLOAD_PATH" >> $GITHUB_OUTPUT
            echo "url=$FULL_URL" >> $GITHUB_OUTPUT
          else
            echo "::error::Upload failed with status $HTTP_STATUS"
            cat response.txt
            exit 1
          fi