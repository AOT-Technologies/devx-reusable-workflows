name: "Module: Python Build"
# ------------------------------------------------------------------------------
# Deterministic Python build with pip caching, unit tests, artifact upload.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing requirements.txt"
        type: string
        default: "."
      python_version:
        type: string
        default: "3.11"
      install_command:
        description: "Command to install dependencies"
        type: string
        default: "pip install -r requirements.txt"
      # --- TEST INPUTS ---
      run_tests:
        description: "Run unit tests?"
        type: boolean
        default: true
      test_script:
        description: "Script to run tests"
        type: string
        default: "python -m pytest"
      # --- BUILD INPUTS ---
      build_command:
        description: "Command to build/package (optional)"
        type: string
        default: ""
      artifact_path:
        description: "Directory/File to upload. Leave blank to skip."
        type: string
        default: ""
      artifact_name:
        description: "Name of the artifact to upload. If blank, defaults to python-build-${{ github.sha }}"
        type: string
        default: ""

    outputs:
      artifact_name:
        description: "Name of uploaded artifact (empty if no upload)"
        value: ${{ jobs.build.outputs.artifact_name }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Working directory"
        type: string
        default: "."
      python_version:
        description: "Python version"
        type: string
        default: "3.11"
      install_command:
        description: "Install command"
        type: string
        default: "pip install -r requirements.txt"
      run_tests:
        description: "Run tests"
        type: boolean
        default: true
      test_script:
        description: "Test script"
        type: string
        default: "python -m pytest"
      build_command:
        description: "Build command"
        type: string
        default: ""
      artifact_path:
        description: "Artifact path"
        type: string
        default: ""

permissions:
  contents: read
  actions: write        # Required for upload-artifact

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    
    outputs:
      artifact_name: ${{ steps.set_artifact_name.outputs.artifact_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      # ------------------------------------------------------------------------
      # SETUP & CACHE
      # ------------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'
          cache-dependency-path: ${{ inputs.working_directory }}/requirements.txt

      # ------------------------------------------------------------------------
      # INSTALL
      # ------------------------------------------------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.install_command }}

      # --- UNIT TEST STEP ---
      - name: Run Unit Tests
        if: inputs.run_tests == true
        run: ${{ inputs.test_script }}

      # Added test results capture
      - name: Upload Test Results
        if: always() && inputs.run_tests == true
        uses: actions/upload-artifact@v4.3.1
        with:
          name: python-test-results-${{ github.sha }}
          path: |
            ${{ inputs.working_directory }}/.coverage
            ${{ inputs.working_directory }}/coverage.xml
            ${{ inputs.working_directory }}/htmlcov/
            ${{ inputs.working_directory }}/test-results/
            ${{ inputs.working_directory }}/junit.xml
          retention-days: 30
          if-no-files-found: ignore

      # ------------------------------------------------------------------------
      # BUILD
      # ------------------------------------------------------------------------
      - name: Build Application
        if: inputs.build_command != ''
        run: ${{ inputs.build_command }}

      # ------------------------------------------------------------------------
      # ARTIFACT UPLOAD
      # ------------------------------------------------------------------------
      - name: Determine Artifact Name
        id: artifact_name
        run: |
          if [[ -n "${{ inputs.artifact_name }}" ]]; then
            echo "name=${{ inputs.artifact_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=python-build-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Build Artifact
        if: inputs.artifact_path != ''
        uses: actions/upload-artifact@v4.3.1
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: ${{ inputs.working_directory }}/${{ inputs.artifact_path }}
          retention-days: 90

      - name: Set Artifact Name Output
        id: set_artifact_name
        run: |
          if [[ -n "${{ inputs.artifact_path }}" ]]; then
            echo "artifact_name=${{ steps.artifact_name.outputs.name }}" >> $GITHUB_OUTPUT
          else
            echo "artifact_name=" >> $GITHUB_OUTPUT
          fi