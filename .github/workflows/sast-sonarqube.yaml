name: "Module: SonarQube SAST Scan"
# ------------------------------------------------------------------------------
# SonarQube static analysis with quality gates
# Supports: SonarCloud (SaaS) and SonarQube Server (Self-hosted)
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      # --- SCAN CONFIGURATION ---
      scan_path:
        description: "Path to scan (source code directory)"
        type: string
        default: "."
      
      sonar_host_url:
        description: "SonarQube server URL (for self-hosted)"
        type: string
        default: "https://sonarcloud.io"
      
      sonar_organization:
        description: "SonarCloud organization key (SaaS only)"
        type: string
        default: ""
      
      sonar_project_key:
        description: "SonarQube project key"
        type: string
        required: true
      
      # --- QUALITY GATES ---
      fail_on_quality_gate:
        description: "Fail pipeline if quality gate fails"
        type: boolean
        default: true
      
      wait_for_quality_gate:
        description: "Wait for quality gate result"
        type: boolean
        default: true
      
      # --- COVERAGE ---
      coverage_report_path:
        description: "Path to coverage report (optional)"
        type: string
        default: ""
      
      # --- ADVANCED ---
      sonar_scanner_version:
        description: "SonarScanner version"
        type: string
        default: "5.0.1.3006"
      
      additional_args:
        description: "Additional SonarScanner arguments"
        type: string
        default: ""

    secrets:
      sonar_token:
        description: "SonarQube authentication token"
        required: true

  workflow_dispatch:
    inputs:
      scan_path:
        type: string
        default: "."
      sonar_host_url:
        type: string
        default: "https://sonarcloud.io"
      sonar_organization:
        type: string
        default: ""
      sonar_project_key:
        type: string
        required: true
      fail_on_quality_gate:
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write  # For PR decoration

jobs:
  sonarqube-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # ------------------------------------------------------------------------
      # 1. CHECKOUT
      # ------------------------------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0  # Full history for better analysis

      # ------------------------------------------------------------------------
      # 2. SETUP LANGUAGE-SPECIFIC ENVIRONMENTS
      # ------------------------------------------------------------------------
      - name: Setup Java (for SonarScanner)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Auto-detect language and setup accordingly
      - name: Detect Project Language
        id: detect_lang
        run: |
          if [[ -f "package.json" ]]; then
            echo "language=node" >> $GITHUB_OUTPUT
            echo "Detected: Node.js project"
          elif [[ -f "pom.xml" ]]; then
            echo "language=maven" >> $GITHUB_OUTPUT
            echo "Detected: Maven project"
          elif [[ -f "requirements.txt" ]] || [[ -f "setup.py" ]]; then
            echo "language=python" >> $GITHUB_OUTPUT
            echo "Detected: Python project"
          else
            echo "language=generic" >> $GITHUB_OUTPUT
            echo "Detected: Generic project"
          fi

      - name: Setup Node.js (if Node project)
        if: steps.detect_lang.outputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Dependencies
        if: steps.detect_lang.outputs.language == 'node'
        run: npm ci --prefer-offline --no-audit

      - name: Setup Python (if Python project)
        if: steps.detect_lang.outputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        if: steps.detect_lang.outputs.language == 'python'
        run: |
          python -m pip install --upgrade pip
          if [[ -f "requirements.txt" ]]; then
            pip install -r requirements.txt
          fi

      # ------------------------------------------------------------------------
      # 3. RUN TESTS & GENERATE COVERAGE (if available)
      # ------------------------------------------------------------------------
      - name: Run Tests with Coverage (Node.js)
        if: steps.detect_lang.outputs.language == 'node'
        continue-on-error: true
        run: |
          if npm run | grep -q "test"; then
            npm test -- --coverage --coverageReporters=lcov || true
          fi

      - name: Run Tests with Coverage (Python)
        if: steps.detect_lang.outputs.language == 'python'
        continue-on-error: true
        run: |
          if command -v pytest &> /dev/null; then
            pytest --cov --cov-report=xml || true
          fi

      - name: Run Tests with Coverage (Maven)
        if: steps.detect_lang.outputs.language == 'maven'
        continue-on-error: true
        run: |
          mvn clean verify -B || true

      # ------------------------------------------------------------------------
      # 4. SONARQUBE SCAN - MAVEN-SPECIFIC
      # ------------------------------------------------------------------------
      - name: Run SonarQube Analysis (Maven)
        if: steps.detect_lang.outputs.language == 'maven'
        env:
          SONAR_TOKEN: ${{ secrets.sonar_token }}
          SONAR_HOST_URL: ${{ inputs.sonar_host_url }}
        run: |
          echo "🔍 Running SonarQube analysis via Maven plugin..."
          
          # Determine SonarQube command based on host
          if [[ "${{ inputs.sonar_host_url }}" == "https://sonarcloud.io" ]]; then
            echo "Using SonarCloud..."
            mvn clean verify sonar:sonar \
              -Dsonar.host.url=${{ inputs.sonar_host_url }} \
              -Dsonar.organization=${{ inputs.sonar_organization }} \
              -Dsonar.projectKey=${{ inputs.sonar_project_key }} \
              -Dsonar.token=${{ secrets.sonar_token }} \
              -Dsonar.sources=${{ inputs.scan_path }} \
              ${{ inputs.additional_args }} \
              -B
          else
            echo "Using Self-hosted SonarQube..."
            mvn clean verify sonar:sonar \
              -Dsonar.host.url=${{ inputs.sonar_host_url }} \
              -Dsonar.projectKey=${{ inputs.sonar_project_key }} \
              -Dsonar.token=${{ secrets.sonar_token }} \
              -Dsonar.sources=${{ inputs.scan_path }} \
              ${{ inputs.additional_args }} \
              -B
          fi
          
          echo "✅ SonarQube Maven analysis completed"

      # ------------------------------------------------------------------------
      # 4B. SONARQUBE SCAN - NON-MAVEN (Node.js, Python, Generic)
      # ------------------------------------------------------------------------

      # ------------------------------------------------------------------------
      # 4. SONARQUBE SCAN
      # ------------------------------------------------------------------------
      - name: SonarQube Scan (SonarCloud)
        if: inputs.sonar_host_url == 'https://sonarcloud.io'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.sonar_token }}
        with:
          args: >
            -Dsonar.organization=${{ inputs.sonar_organization }}
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.sources=${{ inputs.scan_path }}
            -Dsonar.verbose=false
            ${{ inputs.coverage_report_path != '' && format('-Dsonar.coverageReportPaths={0}', inputs.coverage_report_path) || '' }}
            ${{ inputs.additional_args }}

      - name: SonarQube Scan (Self-Hosted)
        if: inputs.sonar_host_url != 'https://sonarcloud.io'
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.sonar_token }}
          SONAR_HOST_URL: ${{ inputs.sonar_host_url }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.sources=${{ inputs.scan_path }}
            ${{ inputs.coverage_report_path != '' && format('-Dsonar.coverageReportPaths={0}', inputs.coverage_report_path) || '' }}
            ${{ inputs.additional_args }}

      # ------------------------------------------------------------------------
      # 5. QUALITY GATE CHECK
      # ------------------------------------------------------------------------
      - name: Wait for Quality Gate
        if: inputs.wait_for_quality_gate == true
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.sonar_token }}
          SONAR_HOST_URL: ${{ inputs.sonar_host_url }}
        continue-on-error: ${{ !inputs.fail_on_quality_gate }}

      # ------------------------------------------------------------------------
      # 6. SUMMARY & REPORTING
      # ------------------------------------------------------------------------
      - name: Generate Scan Summary
        if: always()
        run: |
          echo "## 🔍 SonarQube SAST Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project Key:** ${{ inputs.sonar_project_key }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ inputs.sonar_host_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Language Detected:** ${{ steps.detect_lang.outputs.language }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Generate dashboard link
          if [[ "${{ inputs.sonar_host_url }}" == "https://sonarcloud.io" ]]; then
            DASHBOARD_URL="https://sonarcloud.io/dashboard?id=${{ inputs.sonar_project_key }}"
          else
            DASHBOARD_URL="${{ inputs.sonar_host_url }}/dashboard?id=${{ inputs.sonar_project_key }}"
          fi
          
          echo "📊 **[View Full Report]($DASHBOARD_URL)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "### ✅ Quality Gate: **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Quality Gate: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR (if pull request)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const projectKey = '${{ inputs.sonar_project_key }}';
            const hostUrl = '${{ inputs.sonar_host_url }}';
            const dashboardUrl = hostUrl === 'https://sonarcloud.io' 
              ? `https://sonarcloud.io/dashboard?id=${projectKey}`
              : `${hostUrl}/dashboard?id=${projectKey}`;
            
            const comment = `## 🔍 SonarQube Analysis
            
            **Project:** \`${projectKey}\`
            
            📊 [View Detailed Report](${dashboardUrl})
            
            > Analysis completed for commit ${context.sha.substring(0, 7)}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });