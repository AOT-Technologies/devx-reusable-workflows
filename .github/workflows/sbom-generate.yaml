name: "Module: SBOM Generation (Syft)"
# ------------------------------------------------------------------------------
# Software Bill of Materials (SBOM) generation using Syft.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      # --- MODE ---
      sbom_type:
        description: "Target type: 'fs' (source code) or 'image' (container)"
        type: string
        default: "image"

      # --- TARGETS ---
      scan_path:
        description: "Path to scan (for fs mode)"
        type: string
        default: "."
      image_uri:
        description: "Full container image URI (for image mode)"
        type: string
        default: ""

      # --- REGISTRY AUTHENTICATION ---
      registry_type:
        description: "Registry type: 'ecr', 'generic', or 'nexus'"
        type: string
        default: "ecr"
      registry_url:
        description: "Registry URL (for generic/nexus)"
        type: string
        default: ""

      # --- AWS AUTHENTICATION (for ECR images) ---
      aws_region:
        description: "AWS region for ECR authentication"
        type: string
        default: "ca-central-1"
      role_to_assume:
        description: "AWS IAM role ARN for OIDC authentication"
        type: string
        default: ""

      # --- FORMAT ---
      format:
        description: "Output format (cyclonedx-json, cyclonedx-xml, spdx-json, spdx-tag-value)"
        type: string
        default: "cyclonedx-json"

      # --- REPORTING ---
      upload_artifact:
        description: "Upload SBOM as pipeline artifact?"
        type: boolean
        default: true

    secrets:
      registry_username:
        description: "Username for registry"
        required: false
      registry_password:
        description: "Password for registry"
        required: false

    outputs:
      sbom_artifact_name:
        description: "Name of the uploaded SBOM artifact"
        value: ${{ jobs.sbom-generate.outputs.artifact_name }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      sbom_type:
        description: "SBOM type"
        type: choice
        options:
          - fs
          - image
        default: "image"
      scan_path:
        description: "Path to scan (fs mode)"
        type: string
        default: "."
      image_uri:
        description: "Image URI (image mode)"
        type: string
        default: ""
      registry_type:
        description: "Registry type"
        type: choice
        options:
          - ecr
          - generic
          - nexus
        default: "ecr"
      registry_url:
        description: "Registry URL"
        type: string
        default: ""
      aws_region:
        description: "AWS region"
        type: string
        default: "ca-central-1"
      role_to_assume:
        description: "AWS IAM role ARN"
        type: string
        default: ""
      format:
        description: "Output format"
        type: choice
        options:
          - cyclonedx-json
          - cyclonedx-xml
          - spdx-json
          - spdx-tag-value
        default: "cyclonedx-json"
      upload_artifact:
        description: "Upload artifact"
        type: boolean
        default: true

permissions:
  contents: read
  actions: write     # Required to upload artifacts
  id-token: write    # Required for AWS OIDC

jobs:
  sbom-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    outputs:
      artifact_name: ${{ steps.set_output.outputs.artifact_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      # ------------------------------------------------------------------------
      # VALIDATION (Defensive Governance)
      # ------------------------------------------------------------------------
      - name: Validate Inputs
        run: |
          # Validate sbom_type
          if [[ "${{ inputs.sbom_type }}" != "fs" ]] && [[ "${{ inputs.sbom_type }}" != "image" ]]; then
            echo "::error::Validation Failed: sbom_type must be 'fs' or 'image', got '${{ inputs.sbom_type }}'"
            exit 1
          fi
          
          # Validate image_uri for image mode
          if [[ "${{ inputs.sbom_type }}" == "image" && -z "${{ inputs.image_uri }}" ]]; then
            echo "::error::Validation Failed: 'image_uri' is required when sbom_type is 'image'"
            exit 1
          fi
          
          # Validate format
          VALID_FORMATS="cyclonedx-json|cyclonedx-xml|spdx-json|spdx-tag-value"
          if [[ ! "${{ inputs.format }}" =~ ^($VALID_FORMATS)$ ]]; then
            echo "::error::Validation Failed: Invalid format '${{ inputs.format }}'"
            echo "::error::Supported formats: cyclonedx-json, cyclonedx-xml, spdx-json, spdx-tag-value"
            exit 1
          fi

      # ------------------------------------------------------------------------
      # REGISTRY AUTHENTICATION
      # ------------------------------------------------------------------------
      # Option A: AWS ECR (OIDC)
      - name: Configure AWS Credentials (ECR)
        if: inputs.registry_type == 'ecr' && inputs.role_to_assume != ''
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: sbom-generation-session

      - name: Login to Amazon ECR
        if: inputs.registry_type == 'ecr' && inputs.role_to_assume != ''
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      # Option B: Generic / Nexus
      - name: Login to Registry (Generic/Nexus)
        if: (inputs.registry_type == 'generic' || inputs.registry_type == 'nexus') && inputs.registry_url != ''
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ inputs.registry_url }}
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_password }}

      # ------------------------------------------------------------------------
      # SETUP SYFT
      # ------------------------------------------------------------------------
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.16.0

      - name: Verify Syft Installation
        run: |
          syft version
          echo "✅ Syft installed successfully"

      # ------------------------------------------------------------------------
      # MODE 1: FILESYSTEM SBOM
      # ------------------------------------------------------------------------
      - name: Generate SBOM (Filesystem)
        timeout-minutes: 10
        if: inputs.sbom_type == 'fs'
        run: |
          echo "📋 Generating filesystem SBOM for: ${{ inputs.scan_path }}"
          syft dir:${{ inputs.scan_path }} \
            -o ${{ inputs.format }} \
            > sbom-${{ github.sha }}.json
          echo "✅ SBOM generated successfully"

      # ------------------------------------------------------------------------
      # MODE 2: IMAGE SBOM (with authentication support)
      # ------------------------------------------------------------------------
      - name: Pull Image for SBOM
        if: inputs.sbom_type == 'image'
        run: |
          echo "📦 Pulling image for SBOM generation: ${{ inputs.image_uri }}"
          docker pull ${{ inputs.image_uri }}
          echo "✅ Image pulled successfully"

      - name: Generate SBOM (Image)
        timeout-minutes: 10
        if: inputs.sbom_type == 'image'
        run: |
          echo "📋 Generating image SBOM for: ${{ inputs.image_uri }}"
          syft ${{ inputs.image_uri }} \
            -o ${{ inputs.format }} \
            > sbom-${{ github.sha }}.json
          echo "✅ SBOM generated successfully"

      # ------------------------------------------------------------------------
      # SBOM VALIDATION
      # ------------------------------------------------------------------------
      - name: Validate SBOM
        run: |
          if [[ ! -f "sbom-${{ github.sha }}.json" ]]; then
            echo "::error::SBOM file not generated"
            exit 1
          fi
          
          # Check file size
          SBOM_SIZE=$(stat -f%z "sbom-${{ github.sha }}.json" 2>/dev/null || stat -c%s "sbom-${{ github.sha }}.json")
          echo "📊 SBOM size: $SBOM_SIZE bytes"
          
          if [[ $SBOM_SIZE -lt 100 ]]; then
            echo "::error::SBOM file is suspiciously small ($SBOM_SIZE bytes)"
            cat "sbom-${{ github.sha }}.json"
            exit 1
          fi
          
          # Count components
          if command -v jq &> /dev/null; then
            COMPONENT_COUNT=$(jq '[.components[]?, .packages[]?] | length' sbom-${{ github.sha }}.json 2>/dev/null || echo "unknown")
            echo "📦 Components found: $COMPONENT_COUNT"
          fi

      # ------------------------------------------------------------------------
      # ARTIFACT OUTPUT
      # ------------------------------------------------------------------------
      - name: Upload SBOM Artifact
        if: inputs.upload_artifact == true
        uses: actions/upload-artifact@v4.3.1
        with:
          name: sbom-${{ github.sha }}
          path: sbom-${{ github.sha }}.json
          retention-days: 90

      - name: Set Output
        id: set_output
        run: |
          if [[ "${{ inputs.upload_artifact }}" == "true" ]]; then
            echo "artifact_name=sbom-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "artifact_name=" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------------------------------------
      # SUMMARY
      # ------------------------------------------------------------------------
      - name: Generate SBOM Summary
        if: always()
        run: |
          echo "## 📋 SBOM Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** ${{ inputs.sbom_type }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.sbom_type }}" == "image" ]]; then
            echo "- **Image:** \`${{ inputs.image_uri }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Path:** ${{ inputs.scan_path }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Format:** ${{ inputs.format }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ -f "sbom-${{ github.sha }}.json" ]]; then
            SBOM_SIZE=$(stat -f%z "sbom-${{ github.sha }}.json" 2>/dev/null || stat -c%s "sbom-${{ github.sha }}.json")
            echo "✅ SBOM generated successfully ($SBOM_SIZE bytes)" >> $GITHUB_STEP_SUMMARY
            
            if command -v jq &> /dev/null; then
              COMPONENT_COUNT=$(jq '[.components[]?, .packages[]?] | length' sbom-${{ github.sha }}.json 2>/dev/null || echo "unknown")
              echo "- **Components:** $COMPONENT_COUNT" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ SBOM generation failed" >> $GITHUB_STEP_SUMMARY
          fi
