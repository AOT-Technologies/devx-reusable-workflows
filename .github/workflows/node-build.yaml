name: "Module: Node Build"
# ------------------------------------------------------------------------------
# Deterministic Node.js build with caching, unit tests, artifact upload.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      working_directory:
        type: string
        default: "."
      node_version:
        type: string
        default: "20"
      # --- TEST INPUTS ---
      run_tests:
        description: "Run unit tests?"
        type: boolean
        default: true
      test_script:
        description: "Script to run tests"
        type: string
        default: "test"
      # --- BUILD INPUTS ---
      run_build:  # ✅ NEW: Make build optional
        description: "Enable build step?"
        type: boolean
        default: false
      build_script:
        type: string
        default: "build"
      artifact_path:
        type: string
        default: ""
    outputs:
      artifact_name:
        description: "Name of uploaded artifact (empty if no upload)"
        value: ${{ jobs.build.outputs.artifact_name }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Working directory"
        type: string
        default: "."
      node_version:
        description: "Node version"
        type: string
        default: "20"
      run_tests:
        description: "Run tests"
        type: boolean
        default: true
      test_script:
        description: "Test script"
        type: string
        default: "test"
      run_build:
        description: "Run build"
        type: boolean
        default: false
      build_script:
        description: "Build script"
        type: string
        default: "build"
      artifact_path:
        description: "Artifact path"
        type: string
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    outputs:
      artifact_name: ${{ steps.set_artifact_name.outputs.artifact_name }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Check if Test Script Exists
        if: inputs.run_tests == true
        id: check_test
        run: |
          if npm run | grep -q "^  ${{ inputs.test_script }}$"; then
            echo "test_exists=true" >> $GITHUB_OUTPUT
          else
            echo "test_exists=false" >> $GITHUB_OUTPUT
            echo "Test script '${{ inputs.test_script }}' not found"
          fi

      - name: Run Unit Tests
        if: inputs.run_tests == true && steps.check_test.outputs.test_exists == 'true'
        run: npm run ${{ inputs.test_script }}

      - name: Upload Test Results
        if: always() && inputs.run_tests == true
        uses: actions/upload-artifact@v4.3.1
        with:
          name: node-test-results-${{ github.run_id }}
          path: |
            ${{ inputs.working_directory }}/coverage/
            ${{ inputs.working_directory }}/test-results/
            ${{ inputs.working_directory }}/junit.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Check if Build Script Exists
        if: inputs.run_build == true
        id: check_build
        run: |
          if npm run | grep -q "^  ${{ inputs.build_script }}$"; then
            echo "build_exists=true" >> $GITHUB_OUTPUT
          else
            echo "build_exists=false" >> $GITHUB_OUTPUT
            echo "::error::Build enabled but script '${{ inputs.build_script }}' not found"
            exit 1
          fi

      - name: Build Application
        if: inputs.run_build == true && steps.check_build.outputs.build_exists == 'true'
        run: npm run ${{ inputs.build_script }}

      - name: Upload Build Artifact
        if: inputs.artifact_path != ''
        uses: actions/upload-artifact@v4.3.1
        with:
          name: node-build-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/${{ inputs.artifact_path }}
          retention-days: 90

      - name: Set Artifact Name Output
        id: set_artifact_name
        run: |
          if [[ -n "${{ inputs.artifact_path }}" ]]; then
            echo "artifact_name=node-build-${{ github.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "artifact_name=" >> $GITHUB_OUTPUT
          fi