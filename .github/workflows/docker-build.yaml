name: "Module: Docker Build & Push (Universal)"
# ------------------------------------------------------------------------------
# UNIVERSAL Docker build module with SMART VERSIONING
#
# VERSIONING STRATEGY:
# - feature/* branches    → feature-<name>-<short-sha>
# - development branch    → dev-<short-sha>
# - release/X.Y.Z branches → X.Y.Z-rc<run-number>  (Release Candidates)
# - Other branches        → <short-sha>
#
# REGISTRY MODES:
# 1. 'ecr': Uses AWS OIDC (No keys). Requires 'role_to_assume'.
# 2. 'generic': Uses Username/Password. Works with Docker Hub, GHCR.
# 3. 'nexus': Uses Nexus Docker registry.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      # --- GENERAL INPUTS ---
      working_directory:
        description: "Directory containing the Dockerfile"
        type: string
        default: "."
      dockerfile:
        description: "Name of the Dockerfile"
        type: string
        default: "Dockerfile"
      image_name:
        description: "Image name (e.g., 'my-app' or 'org/my-app')"
        required: true
        type: string
      image_tag:
        description: "Tag to apply (defaults to smart versioning based on branch)"
        type: string
        default: "" 

      # --- REGISTRY STRATEGY ---
      registry_type:
        description: "Type of registry: 'ecr', 'generic', or 'nexus'"
        type: string
        default: "ecr"
      
      # --- MODE: GENERIC (Docker Hub, GHCR) ---
      registry_url:
        description: "URL of the registry (e.g., 'docker.io', 'ghcr.io'). Required for 'generic'."
        type: string
        default: ""
      
      # --- MODE: AWS ECR ---
      aws_region:
        description: "AWS Region (Required for 'ecr')"
        type: string
        default: "us-east-1"
      role_to_assume:
        description: "IAM Role ARN (Required for 'ecr')"
        type: string
        default: ""

      # --- MODE: NEXUS DOCKER REGISTRY ---
      nexus_url:
        description: "Nexus base URL (Required for 'nexus')"
        type: string
        default: ""
      nexus_docker_repo:
        description: "Nexus Docker repository name (e.g., docker-hosted)"
        type: string
        default: "docker-hosted"
      
      # --- NEXUS ARTIFACT DOWNLOAD (Optimization) ---
      nexus_artifact_base_url:
        description: "Base URL for Nexus artifact download (e.g. https://nexus.example.com)"
        type: string
        default: ""
      nexus_artifact_repo:
        description: "Nexus Maven repository name (e.g., maven-releases) for artifact download"
        type: string
        default: "maven-releases"
      nexus_artifact_path:
        description: "Path to the artifact in Nexus (e.g., com/org/app/1.0.0/app.jar)"
        type: string
        default: ""

      # --- BUILD OPTIONS ---
      build_args:
        description: "Build args in KEY=VALUE format, one per line (optional)"
        type: string
        default: ""
      platforms:
        description: "Target platforms (e.g., 'linux/amd64,linux/arm64'). Defaults to linux/amd64."
        type: string
        default: "linux/amd64"

    secrets:
      # Secrets for 'generic' mode
      registry_username:
        description: "Username for Generic Registry"
        required: false
      registry_password:
        description: "Password/Token for Generic Registry"
        required: false
      # Secrets for 'nexus' mode
      NEXUS_USERNAME:
        description: "Nexus Username"
        required: false
      NEXUS_PASSWORD:
        description: "Nexus Password/Token"
        required: false

    outputs:
      image_uri:
        description: "Full URI of the pushed image"
        value: ${{ jobs.build-push.outputs.image_uri }}
      image_digest:
        description: "SHA256 digest of the pushed image (immutable reference)"
        value: ${{ jobs.build-push.outputs.image_digest }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Directory with Dockerfile"
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile name"
        type: string
        default: "Dockerfile"
      image_name:
        description: "Image name"
        type: string
        required: true
      image_tag:
        description: "Image tag (leave empty for smart versioning)"
        type: string
        default: ""
      registry_type:
        description: "Registry type"
        type: choice
        options:
          - ecr
          - generic
          - nexus
        default: "ecr"
      registry_url:
        description: "Registry URL (generic mode)"
        type: string
        default: ""
      aws_region:
        description: "AWS Region (ECR mode)"
        type: string
        default: "us-east-1"
      role_to_assume:
        description: "IAM Role ARN (ECR mode)"
        type: string
        default: ""
      nexus_url:
        description: "Nexus URL (nexus mode)"
        type: string
        default: ""
      nexus_docker_repo:
        description: "Nexus Docker repository"
        type: string
        default: "docker-hosted"
      build_args:
        description: "Build arguments (KEY=VALUE, one per line)"
        type: string
        default: ""
      platforms:
        description: "Target platforms"
        type: string
        default: "linux/amd64"

permissions:
  contents: read
  id-token: write  # AWS OIDC
  packages: write  # GHCR push
  actions: write   # Artifact uploads

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      # ----------------------------------------------------------------------
      # 1. SETUP
      # ----------------------------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      # ----------------------------------------------------------------------
      # 2. REGISTRY AUTHENTICATION (Strategy Pattern)
      # ----------------------------------------------------------------------
      
      # MODE A: AWS ECR (OIDC - No Keys)
      - name: Configure AWS Credentials (OIDC)
        if: inputs.registry_type == 'ecr'
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        if: inputs.registry_type == 'ecr'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.0.1

      # MODE B: Generic Registry (Docker Hub, GHCR, etc.)
      - name: Login to Generic Registry
        if: inputs.registry_type == 'generic'
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ inputs.registry_url }}
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_password }}

      # MODE C: Nexus Docker Registry
      - name: Login to Nexus Docker Registry
        if: inputs.registry_type == 'nexus'
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ inputs.nexus_url }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      # ----------------------------------------------------------------------
      # 3. NEXUS ARTIFACT DOWNLOAD (Optional Performance Optimization)
      # If artifacts are pre-built and uploaded to Nexus, download them
      # directly into the Docker build context instead of rebuilding.
      # ----------------------------------------------------------------------
      - name: Download Artifact from Nexus
        if: inputs.nexus_artifact_path != ''
        id: download
        env:
          NEXUS_BASE_URL: ${{ inputs.nexus_artifact_base_url }}
          NEXUS_REPO: ${{ inputs.nexus_artifact_repo }}
          ARTIFACT_PATH: ${{ inputs.nexus_artifact_path }}
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          echo "📦 Downloading artifact from Nexus..."
          
          # Construct full URL: BASE_URL/repository/REPO/PATH
          ARTIFACT_URL="${NEXUS_BASE_URL}/repository/${NEXUS_REPO}/${ARTIFACT_PATH}"
          
          # Extract filename from path
          FILENAME=$(basename "$ARTIFACT_PATH")
          
          # Download with authentication
          curl -u "${NEXUS_USER}:${NEXUS_PASS}" \
               -f \
               -o "${FILENAME}" \
               "${ARTIFACT_URL}"
          
          if [[ $? -eq 0 ]]; then
            echo "✅ Downloaded: ${FILENAME}"
            ls -lh "${FILENAME}"
            echo "artifact_name=${FILENAME}" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to download artifact from ${ARTIFACT_URL}"
            exit 1
          fi

      # ----------------------------------------------------------------------
      # 4. SMART VERSIONING METADATA
      # Detects branch type and generates appropriate image tags
      # ----------------------------------------------------------------------
      - name: Calculate Metadata
        id: meta
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          REGISTRY_TYPE: ${{ inputs.registry_type }}
          NEXUS_URL: ${{ inputs.nexus_url }}
          NEXUS_DOCKER_REPO: ${{ inputs.nexus_docker_repo }}
          IMAGE_NAME: ${{ inputs.image_name }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          GENERIC_REGISTRY: ${{ inputs.registry_url }}
        run: |
          echo "🏷️  SMART VERSIONING - Branch Detection"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # 1. DETERMINE TAG WITH BRANCH-AWARE LOGIC
          if [[ -n "$IMAGE_TAG" ]]; then
            # Explicit tag from input (manual override or config)
            TAG="$IMAGE_TAG"
            echo "🎯 Explicit tag provided: $TAG"
          
          elif [[ "$GITHUB_REF" =~ ^refs/heads/release/(.+)$ ]]; then
            # RELEASE BRANCH: Extract version and append RC number
            VERSION="${BASH_REMATCH[1]}"
            # Strip leading 'v' if present (release/v2.1.0 → 2.1.0)
            VERSION="${VERSION#v}"
            TAG="${VERSION}-rc${GITHUB_RUN_NUMBER}"
            echo "📦 Release branch detected: $GITHUB_REF"
            echo "🎯 Building release candidate: $TAG"
            echo "   (Run #${GITHUB_RUN_NUMBER} on this release branch)"
          
          elif [[ "$GITHUB_REF" == "refs/heads/development" || "$GITHUB_REF" == "refs/heads/develop" ]]; then
            # DEVELOPMENT BRANCH: Prefix with 'dev-'
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="dev-${SHORT_SHA}"
            echo "🔧 Development branch build: $TAG"
          
          elif [[ "$GITHUB_REF" =~ ^refs/heads/feature/(.+)$ ]]; then
            # FEATURE BRANCH: Sanitized name + short SHA
            FEATURE_NAME="${BASH_REMATCH[1]}"
            # Replace slashes and other special chars with hyphens
            FEATURE_NAME=$(echo "$FEATURE_NAME" | sed 's|[^a-zA-Z0-9]|-|g')
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="feature-${FEATURE_NAME}-${SHORT_SHA}"
            echo "🚀 Feature branch build: $TAG"
          
          else
            # FALLBACK: Short SHA (for main, hotfix, or any other branch)
            TAG=$(git rev-parse --short HEAD)
            echo "⚙️  Standard build (SHA): $TAG"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # 2. DETERMINE REGISTRY BASE URL AND CONSTRUCT FULL URI
          if [[ "$REGISTRY_TYPE" == "nexus" ]]; then
            REGISTRY="$NEXUS_URL"
            
            # Nexus has two modes:
            # A. Dedicated port mode: nexus.example.com:8082 (no repository path)
            # B. Subdirectory mode:   nexus.example.com/repository/docker-hosted
            
            # Detection: If nexus_docker_repo is empty or 'docker-hosted' AND URL has port, assume dedicated
            if [[ "$NEXUS_DOCKER_REPO" == "docker-hosted" || -z "$NEXUS_DOCKER_REPO" ]] && [[ "$NEXUS_URL" =~ :[0-9]+$ ]]; then
              # Dedicated port mode
              FULL_URI="${REGISTRY}/${IMAGE_NAME}:${TAG}"
            else
              # Subdirectory mode
              FULL_URI="${REGISTRY}/${NEXUS_DOCKER_REPO}/${IMAGE_NAME}:${TAG}"
            fi
          
          elif [[ "$REGISTRY_TYPE" == "ecr" ]]; then
            # AWS ECR
            REGISTRY="$ECR_REGISTRY"
            FULL_URI="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          
          else
            # Generic (Docker Hub, GHCR, etc.)
            REGISTRY="$GENERIC_REGISTRY"
            # Docker Hub special case: no registry prefix if it's docker.io
            if [[ "$REGISTRY" == "docker.io" ]]; then
              FULL_URI="${IMAGE_NAME}:${TAG}"
            else
              FULL_URI="${REGISTRY}/${IMAGE_NAME}:${TAG}"
            fi
          fi
          
          echo "image_uri=$FULL_URI" >> $GITHUB_OUTPUT
          echo ""
          echo "📦 Final Image URI: $FULL_URI"

      # ----------------------------------------------------------------------
      # 5. BUILD & PUSH (with Provenance OFF for reproducibility)
      # ----------------------------------------------------------------------
      - name: Parse Build Args
        id: parse-build-args
        env:
          BUILD_ARGS: ${{ inputs.build_args }}
          DOWNLOADED_ARTIFACT: ${{ steps.download.outputs.artifact_name }}
        run: |
          # Start with the input build args
          COMBINED_ARGS="$BUILD_ARGS"
          
          # If an artifact was downloaded, inject ARTIFACT_NAME automatically
          if [[ -n "$DOWNLOADED_ARTIFACT" ]]; then
            echo "📦 Injecting ARTIFACT_NAME=$DOWNLOADED_ARTIFACT into build-args"
            if [[ -n "$COMBINED_ARGS" ]]; then
              COMBINED_ARGS="${COMBINED_ARGS}"$'\n'"ARTIFACT_NAME=$DOWNLOADED_ARTIFACT"
            else
              COMBINED_ARGS="ARTIFACT_NAME=$DOWNLOADED_ARTIFACT"
            fi
          fi
          
          if [[ -n "$COMBINED_ARGS" ]]; then
            # Convert multiline string to comma-separated for build-push-action
            ARGS=$(echo "$COMBINED_ARGS" | tr '\n' ',' | sed 's/,$//')
            echo "args=$ARGS" >> $GITHUB_OUTPUT
            echo "📋 Combined Build Args: $ARGS"
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5.1.0
        with:
          context: ${{ inputs.working_directory }}
          file: ${{ inputs.working_directory }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.image_uri }}
          build-args: ${{ steps.parse-build-args.outputs.args }}
          provenance: false  # Disable provenance for reproducible builds
          # Note: Set provenance: true, mode: max for SLSA Level 2+ compliance
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------------
      # 6. OUTPUT SUMMARY
      # ----------------------------------------------------------------------
      - name: Summary
        run: |
          echo "# 🐳 Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Attribute | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image URI** | \`${{ steps.meta.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ steps.meta.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | ${{ inputs.registry_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | ${{ inputs.platforms }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Image pushed successfully to registry" >> $GITHUB_STEP_SUMMARY