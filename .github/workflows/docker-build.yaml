name: "Module: Docker Build & Push (Universal)"
# ------------------------------------------------------------------------------
# UNIVERSAL Docker build module.
#
# MODES:
# 1. 'ecr': Uses AWS OIDC (No keys). Requires 'role_to_assume'.
# 2. 'generic': Uses Username/Password. Works with Docker Hub, GHCR.
# 3. 'nexus': Uses Nexus Docker registry.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      # --- GENERAL INPUTS ---
      working_directory:
        description: "Directory containing the Dockerfile"
        type: string
        default: "."
      dockerfile:
        description: "Name of the Dockerfile"
        type: string
        default: "Dockerfile"
      image_name:
        description: "Image name (e.g., 'my-app' or 'org/my-app')"
        required: true
        type: string
      image_tag:
        description: "Tag to apply (defaults to git short SHA)"
        type: string
        default: "" 

      # --- REGISTRY STRATEGY ---
      registry_type:
        description: "Type of registry: 'ecr', 'generic', or 'nexus'"
        type: string
        default: "ecr"
      
      # --- MODE: GENERIC (Docker Hub, GHCR) ---
      registry_url:
        description: "URL of the registry (e.g., 'docker.io', 'ghcr.io'). Required for 'generic'."
        type: string
        default: ""
      
      # --- MODE: AWS ECR ---
      aws_region:
        description: "AWS Region (Required for 'ecr')"
        type: string
        default: "us-east-1"
      role_to_assume:
        description: "IAM Role ARN (Required for 'ecr')"
        type: string
        default: ""

      # --- MODE: NEXUS DOCKER REGISTRY ---
      nexus_url:
        description: "Nexus base URL (Required for 'nexus')"
        type: string
        default: ""
      nexus_docker_repo:
        description: "Nexus Docker repository name (e.g., docker-hosted)"
        type: string
        default: "docker-hosted"
      
      # --- NEXUS ARTIFACT DOWNLOAD (Optimization) ---
      nexus_artifact_base_url:
        description: "Base URL for Nexus artifact download (e.g. https://nexus.example.com)"
        type: string
        default: ""
      nexus_artifact_repo:
        description: "Nexus Maven repository name (e.g., maven-releases) for artifact download"
        type: string
        default: "maven-releases"
      nexus_artifact_path:
        description: "Path to the artifact in Nexus (e.g., com/org/app/1.0.0/app.jar)"
        type: string
        default: ""

      # --- BUILD OPTIONS ---
      build_args:
        description: "Build args in KEY=VALUE format, one per line (optional)"
        type: string
        default: ""
      platforms:
        description: "Target platforms (e.g., 'linux/amd64,linux/arm64'). Defaults to linux/amd64."
        type: string
        default: "linux/amd64"

    secrets:
      # Secrets for 'generic' mode
      registry_username:
        description: "Username for Generic Registry"
        required: false
      registry_password:
        description: "Password/Token for Generic Registry"
        required: false
      # Secrets for 'nexus' mode
      NEXUS_USERNAME:
        description: "Nexus Username"
        required: false
      NEXUS_PASSWORD:
        description: "Nexus Password/Token"
        required: false

    outputs:
      image_uri:
        description: "Full URI of the pushed image"
        value: ${{ jobs.build-push.outputs.image_uri }}
      image_digest:
        description: "SHA256 digest of the pushed image (immutable reference)"
        value: ${{ jobs.build-push.outputs.image_digest }}

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Directory with Dockerfile"
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile name"
        type: string
        default: "Dockerfile"
      image_name:
        description: "Image name"
        type: string
        required: true
      image_tag:
        description: "Image tag"
        type: string
        default: ""
      registry_type:
        description: "Registry type"
        type: choice
        options:
          - ecr
          - generic
          - nexus
        default: "ecr"
      registry_url:
        description: "Registry URL (generic mode)"
        type: string
        default: ""
      aws_region:
        description: "AWS Region (ECR mode)"
        type: string
        default: "us-east-1"
      role_to_assume:
        description: "IAM Role ARN (ECR mode)"
        type: string
        default: ""
      nexus_url:
        description: "Nexus URL (nexus mode)"
        type: string
        default: ""
      build_args:
        description: "Build arguments"
        type: string
        default: ""
      platforms:
        description: "Target platforms"
        type: string
        default: "linux/amd64"

permissions:
  id-token: write       # REQUIRED: For OIDC (ECR)
  contents: read        # REQUIRED: To checkout code
  actions: write        # REQUIRED: To write cache
  packages: write       # REQUIRED: If pushing to GHCR

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    outputs:
      image_uri: ${{ steps.set_output.outputs.image_uri }}
      image_digest: ${{ steps.set_output.outputs.image_digest }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      # ------------------------------------------------------------------------
      # DIRECT ARTIFACT DOWNLOAD (Optimized Flow)
      # ------------------------------------------------------------------------
      - name: Download Artifact from Nexus
        if: inputs.registry_type == 'nexus' && inputs.nexus_artifact_path != ''
        id: download
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
          ARTIFACT_PATH: ${{ inputs.nexus_artifact_path }}
          BASE_URL: ${{ inputs.nexus_artifact_base_url }}
          REPO: ${{ inputs.nexus_artifact_repo }}
        run: |
          echo "📥 Downloading artifact for Docker context..."
          
          # Extract filename from path
          ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          
          FULL_URL="${BASE_URL}/repository/${REPO}/${ARTIFACT_PATH}" # URL logged may contain potential credential path | Mask or remove the echo if needed
          echo "Source: $FULL_URL"
          echo "Target: ./$ARTIFACT_NAME"

          # run: |
          #   MASKED_URL=$(echo "$FULL_URL" | sed 's|://[^@]*@|://***:***@|g')
          #   echo "URL: $MASKED_URL"
          
          # Use curl to download
          HTTP_STATUS=$(curl -f -s \
            -u "$NEXUS_USER:$NEXUS_PASS" \
            -o "./$ARTIFACT_NAME" \
            -w "%{http_code}" \
            "$FULL_URL" 2>&1) || HTTP_STATUS="FAILED"
          
          if [[ "$HTTP_STATUS" == "200" && -f "./$ARTIFACT_NAME" ]]; then
            echo "✅ Artifact downloaded successfully."
            ls -lh "./$ARTIFACT_NAME"
          else
            echo "::error::Failed to download artifact from Nexus (HTTP $HTTP_STATUS)"
            exit 1
          fi

      # ------------------------------------------------------------------------
      # INPUT VALIDATION
      # ------------------------------------------------------------------------
      - name: Validate Inputs
        env:
          REGISTRY_TYPE: ${{ inputs.registry_type }}
          ROLE_ARN: ${{ inputs.role_to_assume }}
          REGISTRY_URL: ${{ inputs.registry_url }}
          REG_USER: ${{ secrets.registry_username }}
          REG_PASS: ${{ secrets.registry_password }}
          NEXUS_URL: ${{ inputs.nexus_url }}
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          # Validate ECR mode requirements
          if [[ "$REGISTRY_TYPE" == "ecr" ]]; then
            if [[ -z "$ROLE_ARN" ]]; then
              echo "::error::ERROR: 'role_to_assume' is required when registry_type is 'ecr'"
              exit 1
            fi
          fi
          
          # Validate Generic mode requirements
          if [[ "$REGISTRY_TYPE" == "generic" ]]; then
            if [[ -z "$REGISTRY_URL" ]]; then
              echo "::error::ERROR: 'registry_url' is required when registry_type is 'generic'"
              exit 1
            fi
            if [[ -z "$REG_USER" ]] || [[ -z "$REG_PASS" ]]; then
              echo "::error::ERROR: 'registry_username' and 'registry_password' secrets are required for generic mode"
              exit 1
            fi
          fi
          
          # Validate Nexus mode requirements
          if [[ "$REGISTRY_TYPE" == "nexus" ]]; then
            if [[ -z "$NEXUS_URL" ]]; then
              echo "::error::ERROR: 'nexus_url' is required when registry_type is 'nexus'"
              exit 1
            fi
            if [[ -z "$NEXUS_USER" ]] || [[ -z "$NEXUS_PASS" ]]; then
              echo "::error::ERROR: NEXUS_USERNAME and NEXUS_PASSWORD secrets are required for nexus mode"
              exit 1
            fi
          fi
          
          # Validate registry_type value
          if [[ "$REGISTRY_TYPE" != "ecr" ]] && [[ "$REGISTRY_TYPE" != "generic" ]] && [[ "$REGISTRY_TYPE" != "nexus" ]]; then
            echo "::error::ERROR: registry_type must be 'ecr', 'generic', or 'nexus', got: '$REGISTRY_TYPE'"
            exit 1
          fi
          
          echo "✅ Input validation passed"

      # ------------------------------------------------------------------------
      # STRATEGY A: AWS ECR (OIDC)
      # ------------------------------------------------------------------------
      - name: Configure AWS Credentials
        if: inputs.registry_type == 'ecr'
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        if: inputs.registry_type == 'ecr'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.0.1

      # ------------------------------------------------------------------------
      # STRATEGY B: GENERIC (Docker Hub / GHCR)
      # ------------------------------------------------------------------------
      - name: Login to Generic Registry
        if: inputs.registry_type == 'generic'
        id: login-generic
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ inputs.registry_url }}
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_password }}

      # ------------------------------------------------------------------------
      # STRATEGY C: NEXUS DOCKER REGISTRY
      # ------------------------------------------------------------------------
      - name: Login to Nexus Docker Registry
        if: inputs.registry_type == 'nexus'
        id: login-nexus
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ inputs.nexus_url }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      # ------------------------------------------------------------------------
      # SHARED: SETUP BUILDX
      # ------------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Calculate Metadata
        id: meta
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          REGISTRY_TYPE: ${{ inputs.registry_type }}
          NEXUS_URL: ${{ inputs.nexus_url }}
          NEXUS_DOCKER_REPO: ${{ inputs.nexus_docker_repo }}
          IMAGE_NAME: ${{ inputs.image_name }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          GENERIC_REGISTRY: ${{ inputs.registry_url }}
        run: |
          # 1. Determine Tag
          if [[ -n "$IMAGE_TAG" ]]; then
            TAG="$IMAGE_TAG"
          else
            TAG=$(git rev-parse --short HEAD)
          fi
          
          # 2. Determine Registry Base URL and construct Full URI
          if [[ "$REGISTRY_TYPE" == "nexus" ]]; then
            REGISTRY="$NEXUS_URL"
            FULL_URI="${REGISTRY}/${NEXUS_DOCKER_REPO}/${IMAGE_NAME}:$TAG"
          elif [[ "$REGISTRY_TYPE" == "ecr" ]]; then
            REGISTRY="$ECR_REGISTRY"
            FULL_URI="$REGISTRY/${IMAGE_NAME}:$TAG"
          else
            REGISTRY="$GENERIC_REGISTRY"
            if [[ -z "$REGISTRY" ]]; then
              FULL_URI="docker.io/${IMAGE_NAME}:$TAG"
            elif [[ "$REGISTRY" == "docker.io" ]]; then
              FULL_URI="docker.io/${IMAGE_NAME}:$TAG"
            else
              FULL_URI="$REGISTRY/${IMAGE_NAME}:$TAG"
            fi
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "full_uri=$FULL_URI" >> $GITHUB_OUTPUT
          echo "Image will be pushed to: $FULL_URI"

      # ------------------------------------------------------------------------
      # PREPARE BUILD ARGUMENTS
      # ------------------------------------------------------------------------
      - name: Prepare Build Arguments
        id: build_args
        run: |
          # Use a temporary file to handle multi-line build args safely
          cat > build_args.txt << 'EOF'
          ${{ inputs.build_args }}
          EOF
          
          # Output the combined build args
          echo "combined_args<<EOF" >> $GITHUB_OUTPUT
          cat build_args.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------------
      # SHARED: BUILD & PUSH
      # ------------------------------------------------------------------------
      - name: Build and Push
        id: build-push
        uses: docker/build-push-action@v5.1.0
        with:
          context: ${{ inputs.working_directory }}
          file: ${{ inputs.working_directory }}/${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.full_uri }}
          platforms: ${{ inputs.platforms }}
          build-args: |
            ${{ steps.build_args.outputs.combined_args }}
            ARTIFACT_NAME=${{ steps.download.outputs.artifact_name }}
          # Standard GHA Caching
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # DOCUMENTED: Provenance disabled for compatibility with older registries
          provenance: false

      # ------------------------------------------------------------------------
      # OUTPUT
      # ------------------------------------------------------------------------
      - name: Set Output
        id: set_output
        run: |
          echo "image_uri=${{ steps.meta.outputs.full_uri }}" >> $GITHUB_OUTPUT
          echo "image_digest=${{ steps.build-push.outputs.digest }}" >> $GITHUB_OUTPUT
          echo "✅ Image pushed successfully!"
          echo "URI: ${{ steps.meta.outputs.full_uri }}"
          echo "Digest: ${{ steps.build-push.outputs.digest }}"