name: "Module: JFrog Artifactory Upload"
# ------------------------------------------------------------------------------
# Uploads build artifacts to JFrog Artifactory
# Supports: Maven JAR/WAR, npm packages, Python wheels
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      # --- ARTIFACTORY CONFIGURATION ---
      artifactory_url:
        description: "JFrog Artifactory URL (e.g., https://company.jfrog.io/artifactory)"
        type: string
        required: true
      
      repository:
        description: "Target repository (e.g., libs-snapshot-local, libs-release-local)"
        type: string
        required: true
      
      # --- ARTIFACT DETAILS ---
      artifact_name:
        description: "GitHub Actions artifact name to download"
        type: string
        required: true
      
      artifact_file:
        description: "File name within the artifact (e.g., forms-flow-bpm.jar)"
        type: string
        required: true
      
      # --- MAVEN COORDINATES (for Maven artifacts) ---
      group_id:
        description: "Maven group ID (e.g., com.formsflow)"
        type: string
        default: ""
      
      artifact_id:
        description: "Maven artifact ID (e.g., bpm)"
        type: string
        default: ""
      
      version:
        description: "Artifact version (e.g., 1.0.0-SNAPSHOT)"
        type: string
        default: ""
      
      # --- GENERIC PATH (alternative to Maven coordinates) ---
      upload_path:
        description: "Custom upload path (if not using Maven coordinates)"
        type: string
        default: ""
      
      # --- OPTIONS ---
      calculate_checksums:
        description: "Calculate and upload checksums (SHA1, SHA256)"
        type: boolean
        default: true
      
      properties:
        description: "Custom properties to attach (format: key1=value1;key2=value2)"
        type: string
        default: ""

    secrets:
      artifactory_user:
        description: "JFrog username or identity token"
        required: true
      artifactory_token:
        description: "JFrog password or access token"
        required: true

    outputs:
      artifact_url:
        description: "Full URL to uploaded artifact"
        value: ${{ jobs.upload.outputs.artifact_url }}
      artifact_path:
        description: "Path in Artifactory"
        value: ${{ jobs.upload.outputs.artifact_path }}

  workflow_dispatch:
    inputs:
      artifactory_url:
        type: string
        required: true
      repository:
        type: string
        required: true
      artifact_name:
        type: string
        required: true
      artifact_file:
        type: string
        required: true

permissions:
  contents: read
  actions: read  # To download artifacts

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    outputs:
      artifact_url: ${{ steps.upload.outputs.url }}
      artifact_path: ${{ steps.upload.outputs.path }}
    
    steps:
      # ------------------------------------------------------------------------
      # 0. PRE-FLIGHT CHECKS
      # ------------------------------------------------------------------------
      - name: Pre-flight Check
        run: |
          echo "🔍 Checking Artifactory configuration..."
          
          MISSING_SECRETS=0
          if [[ -z "${{ secrets.artifactory_user }}" ]]; then
            echo "::error::ARTIFACTORY_USER secret is missing or empty"
            MISSING_SECRETS=1
          fi
          if [[ -z "${{ secrets.artifactory_token }}" ]]; then
            echo "::error::ARTIFACTORY_TOKEN secret is missing or empty"
            MISSING_SECRETS=1
          fi
          
          if [[ "$MISSING_SECRETS" -eq 1 ]]; then
            echo "::error::One or more required secrets are missing. Please check your GitHub Repository Secrets."
            exit 1
          fi
          
          echo "✅ Secrets are present"
          echo "📍 URL: ${{ inputs.artifactory_url }}"
          echo "📍 Repository: ${{ inputs.repository }}"

      # ------------------------------------------------------------------------
      # 1. DOWNLOAD BUILD ARTIFACT
      # ------------------------------------------------------------------------
      - name: Download Build Artifact from GitHub
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ./artifacts

      - name: Verify Artifact
        run: |
          echo "📦 Downloaded artifacts:"
          ls -lah ./artifacts/
          
          # Verify the specific file exists
          if [[ ! -f "./artifacts/${{ inputs.artifact_file }}" ]]; then
            echo "::error::Artifact file not found: ${{ inputs.artifact_file }}"
            echo "Available files:"
            ls -la ./artifacts/
            exit 1
          fi
          
          FILE_SIZE=$(stat -f%z "./artifacts/${{ inputs.artifact_file }}" 2>/dev/null || stat -c%s "./artifacts/${{ inputs.artifact_file }}")
          echo "✅ Artifact found: ${{ inputs.artifact_file }} (${FILE_SIZE} bytes)"

      # ------------------------------------------------------------------------
      # 2. CALCULATE UPLOAD PATH
      # ------------------------------------------------------------------------
      - name: Calculate Upload Path
        id: calc_path
        run: |
          # Determine upload path based on inputs
          if [[ -n "${{ inputs.upload_path }}" ]]; then
            # Custom path provided
            UPLOAD_PATH="${{ inputs.upload_path }}"
            echo "Using custom path: $UPLOAD_PATH"
          elif [[ -n "${{ inputs.group_id }}" && -n "${{ inputs.artifact_id }}" && -n "${{ inputs.version }}" ]]; then
            # Maven coordinates provided
            GROUP_PATH=$(echo "${{ inputs.group_id }}" | tr '.' '/')
            UPLOAD_PATH="${GROUP_PATH}/${{ inputs.artifact_id }}/${{ inputs.version }}/${{ inputs.artifact_file }}"
            echo "Using Maven coordinates: $UPLOAD_PATH"
          else
            # Default: use artifact name
            UPLOAD_PATH="generic/${{ inputs.artifact_file }}"
            echo "Using default path: $UPLOAD_PATH"
          fi
          
          echo "path=$UPLOAD_PATH" >> $GITHUB_OUTPUT
          echo "📍 Upload path: $UPLOAD_PATH"

      # ------------------------------------------------------------------------
      # 3. CALCULATE CHECKSUMS
      # ------------------------------------------------------------------------
      - name: Calculate Checksums
        if: inputs.calculate_checksums == true
        id: checksums
        run: |
          ARTIFACT_FILE="./artifacts/${{ inputs.artifact_file }}"
          
          # Calculate SHA1
          SHA1=$(sha1sum "$ARTIFACT_FILE" | awk '{print $1}')
          echo "sha1=$SHA1" >> $GITHUB_OUTPUT
          echo "SHA1: $SHA1"
          
          # Calculate SHA256
          SHA256=$(sha256sum "$ARTIFACT_FILE" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"
          
          # Calculate MD5
          MD5=$(md5sum "$ARTIFACT_FILE" | awk '{print $1}')
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          echo "MD5: $MD5"

      # ------------------------------------------------------------------------
      # 4. UPLOAD TO ARTIFACTORY
      # ------------------------------------------------------------------------
      - name: Upload to JFrog Artifactory
        id: upload
        run: |
          ARTIFACT_FILE="./artifacts/${{ inputs.artifact_file }}"
          UPLOAD_PATH="${{ steps.calc_path.outputs.path }}"
          FULL_URL="${{ inputs.artifactory_url }}/${{ inputs.repository }}/${UPLOAD_PATH}"
          
          echo "📤 Uploading to Artifactory..."
          echo "URL: $FULL_URL"
          
          # Build curl command with headers
          # -s: silent
          # -w "%{http_code}": output only the HTTP status code
          # -o response.txt: save the response body (error message) to a file
          # Use single quotes for credentials to handle special characters
          CURL_CMD="curl -s -u '${{ secrets.artifactory_user }}:${{ secrets.artifactory_token }}' -w \"%{http_code}\" -o response.txt"
          
          # Add checksums if calculated
          if [[ "${{ inputs.calculate_checksums }}" == "true" ]]; then
            CURL_CMD="$CURL_CMD -H \"X-Checksum-Sha1: ${{ steps.checksums.outputs.sha1 }}\""
            CURL_CMD="$CURL_CMD -H \"X-Checksum-Sha256: ${{ steps.checksums.outputs.sha256 }}\""
            CURL_CMD="$CURL_CMD -H \"X-Checksum-Md5: ${{ steps.checksums.outputs.md5 }}\""
          fi
          
          # Add custom properties if provided
          if [[ -n "${{ inputs.properties }}" ]]; then
            CURL_CMD="$CURL_CMD -H \"X-Artifactory-Properties: ${{ inputs.properties }}\""
          fi
          
          # Upload file
          CURL_CMD="$CURL_CMD -X PUT -T \"$ARTIFACT_FILE\" \"$FULL_URL\""
          
          echo "Executing upload..."
          HTTP_STATUS=$(eval $CURL_CMD)
          
          echo "HTTP Status: $HTTP_STATUS"
          
          if [[ "$HTTP_STATUS" -eq 200 || "$HTTP_STATUS" -eq 201 ]]; then
            echo "✅ Upload successful!"
            echo "url=$FULL_URL" >> $GITHUB_OUTPUT
            echo "path=${UPLOAD_PATH}" >> $GITHUB_OUTPUT
          else
            echo "::error::Upload failed with status $HTTP_STATUS"
            echo "Response body:"
            cat response.txt
            exit 1
          fi

      # ------------------------------------------------------------------------
      # 5. VERIFY UPLOAD
      # ------------------------------------------------------------------------
      - name: Verify Upload
        run: |
          FULL_URL="${{ steps.upload.outputs.url }}"
          
          echo "🔍 Verifying uploaded artifact..."
          
          # Get file info from Artifactory
          # -I: fetch headers only
          # -f: fail on server errors
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -u '${{ secrets.artifactory_user }}:${{ secrets.artifactory_token }}' \
                         "$FULL_URL")
          
          if [[ "$RESPONSE_CODE" -eq 200 ]]; then
            echo "✅ Artifact verified in Artifactory"
            
            # Get file size from Artifactory
            SIZE=$(curl -s -I -u '${{ secrets.artifactory_user }}:${{ secrets.artifactory_token }}' \
                   "$FULL_URL" | grep -i content-length | awk '{print $2}' | tr -d '\r')
            
            if [[ -n "$SIZE" ]]; then
              echo "📦 Remote size: $SIZE bytes"
            fi
          else
            echo "::error::Could not verify artifact. Artifactory returned status $RESPONSE_CODE"
            exit 1
          fi

      # ------------------------------------------------------------------------
      # 6. GENERATE BUILD INFO (Optional)
      # ------------------------------------------------------------------------
      - name: Generate Build Info
        if: inputs.group_id != '' && inputs.artifact_id != '' && inputs.version != ''
        run: |
          cat > build-info.json << EOF
          {
            "version": "1.0.0",
            "name": "${{ inputs.artifact_id }}-build",
            "number": "${{ github.run_number }}",
            "type": "MAVEN",
            "started": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
            "buildAgent": {
              "name": "GitHub Actions",
              "version": "1.0"
            },
            "vcsRevision": "${{ github.sha }}",
            "vcsUrl": "${{ github.server_url }}/${{ github.repository }}",
            "modules": [{
              "id": "${{ inputs.group_id }}:${{ inputs.artifact_id }}:${{ inputs.version }}",
              "artifacts": [{
                "type": "jar",
                "sha256": "${{ steps.checksums.outputs.sha256 }}",
                "sha1": "${{ steps.checksums.outputs.sha1 }}",
                "md5": "${{ steps.checksums.outputs.md5 }}",
                "name": "${{ inputs.artifact_file }}"
              }]
            }],
            "properties": {
              "github.workflow": "${{ github.workflow }}",
              "github.run_id": "${{ github.run_id }}",
              "github.sha": "${{ github.sha }}",
              "github.ref": "${{ github.ref }}"
            }
          }
          EOF
          
          echo "📋 Build Info:"
          cat build-info.json
          
          # Upload build info to Artifactory
          BUILD_INFO_URL="${{ inputs.artifactory_url }}/api/build"
          
          HTTP_STATUS=$(curl -s -u '${{ secrets.artifactory_user }}:${{ secrets.artifactory_token }}' \
               -X PUT \
               -H "Content-Type: application/json" \
               -d @build-info.json \
               -w "%{http_code}" \
               -o build_info_response.txt \
               "$BUILD_INFO_URL")
          
          if [[ "$HTTP_STATUS" -eq 200 || "$HTTP_STATUS" -eq 204 ]]; then
            echo "✅ Build info uploaded successfully"
          else
            echo "::warning::Build info upload failed with status $HTTP_STATUS"
            cat build_info_response.txt
          fi

      # ------------------------------------------------------------------------
      # 7. SUMMARY
      # ------------------------------------------------------------------------
      - name: Generate Summary
        if: always()
        run: |
          echo "## 📦 Artifactory Upload Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ inputs.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** ${{ inputs.artifact_file }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Path:** ${{ steps.calc_path.outputs.path }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.upload.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ inputs.calculate_checksums }}" == "true" ]]; then
            echo "### Checksums" >> $GITHUB_STEP_SUMMARY
            echo "- **SHA256:** \`${{ steps.checksums.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **SHA1:** \`${{ steps.checksums.outputs.sha1 }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **MD5:** \`${{ steps.checksums.outputs.md5 }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "### ✅ Upload Status: **SUCCESS**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Upload Status: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi