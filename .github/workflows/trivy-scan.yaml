name: "Module: Trivy Security Scan"
# ------------------------------------------------------------------------------
# Universal Policy Enforcement Point (Filesystem & Image).
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      # --- MODE ---
      scan_type:
        description: "Scan target: 'fs' (code/deps) or 'image' (container)"
        type: string
        default: "image"

      # --- TARGETS ---
      scan_path:
        description: "Path to scan (for fs mode)"
        type: string
        default: "."
      image_uri:
        description: "Full Image URI (for image mode)"
        type: string
        default: ""

      # --- REGISTRY AUTHENTICATION ---
      registry_type:
        description: "Registry type: 'ecr', 'generic', or 'nexus'"
        type: string
        default: "ecr"
      registry_url:
        description: "Registry URL (for generic/nexus)"
        type: string
        default: ""

      # --- AWS AUTHENTICATION (for ECR images) ---
      aws_region:
        description: "AWS region for ECR authentication"
        type: string
        default: "ca-central-1"
      role_to_assume:
        description: "AWS IAM role ARN for OIDC authentication"
        type: string
        default: ""

      # --- POLICY ---
      severity_threshold:
        description: "Severities to report (e.g., 'CRITICAL,HIGH')"
        type: string
        default: "CRITICAL,HIGH"
      fail_on_vuln:
        description: "Block pipeline if vulnerabilities are found?"
        type: boolean
        default: true
      ignore_unfixed:
        description: "Ignore vulnerabilities with no available patch?"
        type: boolean
        default: true
      scanners:
        description: "Comma-separated list of scanners (vuln,secret,misconfig)"
        type: string
        default: "vuln,secret,misconfig"
      
      # --- REPORTING ---
      output_format:
        description: "Output format: 'table' (logs), 'sarif' (security tab), or 'json'"
        type: string
        default: "sarif"

    secrets:
      registry_username:
        description: "Username for registry"
        required: false
      registry_password:
        description: "Password for registry"
        required: false

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan target"
        type: choice
        options:
          - fs
          - image
        default: "image"
      scan_path:
        description: "Path to scan (fs mode)"
        type: string
        default: "."
      image_uri:
        description: "Image URI (image mode)"
        type: string
        default: ""
      registry_type:
        description: "Registry type"
        type: choice
        options:
          - ecr
          - generic
          - nexus
        default: "ecr"
      registry_url:
        description: "Registry URL"
        type: string
        default: ""
      aws_region:
        description: "AWS region"
        type: string
        default: "ca-central-1"
      role_to_assume:
        description: "AWS IAM role ARN"
        type: string
        default: ""
      severity_threshold:
        description: "Severity threshold"
        type: string
        default: "CRITICAL,HIGH"
      fail_on_vuln:
        description: "Fail on vulnerabilities"
        type: boolean
        default: true
      ignore_unfixed:
        description: "Ignore unfixed"
        type: boolean
        default: true
      scanners:
        description: "Scanners to use"
        type: string
        default: "vuln,secret,misconfig"
      output_format:
        description: "Output format"
        type: choice
        options:
          - sarif
          - json
          - table
        default: "sarif"

permissions:
  contents: read
  security-events: write  # REQUIRED: To upload SARIF results
  id-token: write         # REQUIRED: For AWS OIDC authentication
  actions: read           # REQUIRED: For upload-sarif to access workflow run details

jobs:
  trivy-security-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      # ------------------------------------------------------------------------
      # VALIDATION (Defensive Governance)
      # ------------------------------------------------------------------------
      - name: Validate Inputs
        run: |
          if [[ "${{ inputs.scan_type }}" == "image" && -z "${{ inputs.image_uri }}" ]]; then
            echo "::error::Validation Failed: 'image_uri' is required when scan_type is 'image'."
            exit 1
          fi
          if [[ "${{ inputs.scan_type }}" == "fs" && -z "${{ inputs.scan_path }}" ]]; then
             echo "::error::Validation Failed: 'scan_path' is required when scan_type is 'fs'."
             exit 1
          fi

      # ------------------------------------------------------------------------
      # REGISTRY AUTHENTICATION
      # ------------------------------------------------------------------------
      # Option A: AWS ECR (OIDC)
      - name: Configure AWS Credentials (ECR)
        if: inputs.registry_type == 'ecr' && inputs.role_to_assume != ''
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: trivy-scan-session

      - name: Login to Amazon ECR
        if: inputs.registry_type == 'ecr' && inputs.role_to_assume != ''
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      # Option B: Generic / Nexus
      - name: Login to Registry (Generic/Nexus)
        if: (inputs.registry_type == 'generic' || inputs.registry_type == 'nexus') && inputs.registry_url != ''
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ inputs.registry_url }}
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_password }}

      - name: Pull Image for Scanning
        if: inputs.scan_type == 'image'
        run: |
          echo "ðŸ” Pulling image for local scan: ${{ inputs.image_uri }}"
          docker pull ${{ inputs.image_uri }}
          echo "âœ… Image pulled successfully"

      # ------------------------------------------------------------------------
      # MODE 1: FILESYSTEM SCAN (Dependencies & IaC)
      # ------------------------------------------------------------------------
      - name: Run Trivy (FS)
        if: inputs.scan_type == 'fs'
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: 'fs'
          scan-ref: ${{ inputs.scan_path }}
          scanners: ${{ inputs.scanners }}
          severity: ${{ inputs.severity_threshold }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          format: ${{ inputs.output_format }}
          output: 'trivy-${{ inputs.scan_type }}-results.sarif'
          exit-code: ${{ inputs.fail_on_vuln && '1' || '0' }}

      # ------------------------------------------------------------------------
      # MODE 2: IMAGE SCAN (Container OS & Packages)
      # ------------------------------------------------------------------------
      - name: Run Trivy (Image)
        if: inputs.scan_type == 'image'
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: 'image'
          image-ref: ${{ inputs.image_uri }}
          scanners: ${{ inputs.scanners }}
          severity: ${{ inputs.severity_threshold }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          format: ${{ inputs.output_format }}
          output: 'trivy-${{ inputs.scan_type }}-results.sarif'
          exit-code: ${{ inputs.fail_on_vuln && '1' || '0' }}

      # ------------------------------------------------------------------------
      # REPORTING (SARIF UPLOAD)
      # ------------------------------------------------------------------------
      - name: Upload Results to Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && inputs.output_format == 'sarif'
        with:
          sarif_file: 'trivy-${{ inputs.scan_type }}-results.sarif'
          category: 'trivy-${{ inputs.scan_type }}'

      # ------------------------------------------------------------------------
      # SUMMARY
      # ------------------------------------------------------------------------
      - name: Generate Scan Summary
        if: always()
        run: |
          echo "## ðŸ” Trivy Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Scan Type:** ${{ inputs.scan_type }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.scan_type }}" == "image" ]]; then
            echo "- **Image:** \`${{ inputs.image_uri }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Path:** ${{ inputs.scan_path }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Severity Filter:** ${{ inputs.severity_threshold }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Scanners:** ${{ inputs.scanners }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ -f "trivy-${{ inputs.scan_type }}-results.sarif" ]]; then
            echo "âœ… Scan completed. Results uploaded to Security tab." >> $GITHUB_STEP_SUMMARY
          else
            echo "âš ï¸  Scan completed but no SARIF file generated." >> $GITHUB_STEP_SUMMARY
          fi
