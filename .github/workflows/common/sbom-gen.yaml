name: "SBOM Generation (Syft)"

on:
  workflow_call:
    inputs:
      image:
        description: "Container image to generate SBOM from. Example: ghcr.io/org/app:sha"
        type: string
        required: false

      path:
        description: "Filesystem path to scan (source code or artifact)"
        type: string
        required: false
        default: "."

      format:
        description: "SBOM format: cyclonedx-json | cyclonedx-xml | spdx-json"
        type: string
        required: false
        default: "cyclonedx-json"

    outputs:
      sbom_path:
        description: "Relative path to the generated SBOM file"
        value: ${{ jobs.sbom.outputs.sbom_path }}

jobs:
  sbom:
    runs-on: ubuntu-latest
    outputs:
      sbom_path: ${{ steps.generate.outputs.sbom_path }}

    steps:
      - name: Checkout repository
        if: inputs.path != ''
        uses: actions/checkout@v4

      - name: Install Syft (pinned version)
        uses: anchore/sbom-action/download-syft@v0.17.0

      - name: Generate SBOM from Container Image
        if: inputs.image != ''
        id: generate
        run: |
          OUTPUT="sbom-${{ github.sha }}.json"
          syft ${{ inputs.image }} -o ${{ inputs.format }} > $OUTPUT
          echo "sbom_path=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Generate SBOM from Filesystem
        if: inputs.image == ''
        id: generate
        run: |
          OUTPUT="sbom-${{ github.sha }}.json"
          syft dir:${{ inputs.path }} -o ${{ inputs.format }} > $OUTPUT
          echo "sbom_path=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: ${{ steps.generate.outputs.sbom_path }}
          retention-days: 90
