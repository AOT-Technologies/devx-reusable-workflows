name: "Orchestrator: CI Pipeline"

# ------------------------------------------------------------------------------
# THE BRAIN - ENTERPRISE EDITION
# 1. Reads 'devx-ci.yaml'
# 2. Parallelizes Pre-Build Security Gates (SAST, IaC)
# 3. Routes to Language-Specific Builds (Node/Python/Maven)
# 4. Sequential Post-Build Security: Docker → Trivy → SBOM → SBOM-Scan
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to DevX CI config file"
        type: string
        default: "devx-ci.yaml"
    secrets:
      # Pass through for Docker Hub / Generic Registries
      registry_username:
        required: false
      registry_password:
        required: false

# Prevent multiple runs on same ref (with smart cancellation)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
  # ^ Only cancel in-progress runs on PR/feature branches, not on main/master

permissions:
  contents: read
  security-events: write  # SARIF uploads
  actions: write          # Artifact uploads
  id-token: write         # AWS OIDC
  packages: write         # GHCR push

jobs:
  # ---------------------------------------------------------------------------
  # 1. LOAD CONFIGURATION
  # ---------------------------------------------------------------------------
  load-config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      config: ${{ steps.parse.outputs.config }}
      language: ${{ steps.extract.outputs.language }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      # Validate config file exists and is valid YAML
      - name: Validate Config File
        run: |
          if [[ ! -f "${{ inputs.config_path }}" ]]; then
            echo "::error::Config file not found: ${{ inputs.config_path }}"
            echo "::error::Please create a devx-ci.yaml configuration file"
            exit 1
          fi
          
          # Validate YAML syntax
          yq '.' ${{ inputs.config_path }} > /dev/null || {
            echo "::error::Invalid YAML syntax in ${{ inputs.config_path }}"
            exit 1
          }
          
          # Validate required fields
          LANGUAGE=$(yq '.project.language' ${{ inputs.config_path }})
          if [[ "$LANGUAGE" == "null" || -z "$LANGUAGE" ]]; then
            echo "::error::Missing required field: project.language"
            echo "::error::Please specify project.language in your config (node, python, or maven)"
            exit 1
          fi
          
          # Validate language value
          if [[ ! "$LANGUAGE" =~ ^(node|python|maven)$ ]]; then
            echo "::error::Invalid language: $LANGUAGE"
            echo "::error::Supported languages: node, python, maven"
            exit 1
          fi
          
          echo "✅ Config validation passed"

      # Parse config and set as output
      - name: Parse CI Config
        id: parse
        run: |
          echo "config<<EOF" >> $GITHUB_OUTPUT
          yq -o=json ${{ inputs.config_path }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Extract language for routing
      - name: Extract Routing Info
        id: extract
        run: |
          LANGUAGE=$(yq '.project.language' ${{ inputs.config_path }})
          echo "language=$LANGUAGE" >> $GITHUB_OUTPUT
          echo "📋 Detected language: $LANGUAGE"

  # ---------------------------------------------------------------------------
  # 2. PRE-BUILD SECURITY GATES (Parallel)
  # These run simultaneously as they analyze source code, not built artifacts
  # ---------------------------------------------------------------------------
  sast:
    needs: load-config
    if: fromJson(needs.load-config.outputs.config).security.sast.enabled == true
    uses: ./.github/workflows/sast-scan.yaml
    with:
      scan_path: ${{ fromJson(needs.load-config.outputs.config).security.sast.scan_path || '.' }}
      exclude_paths: ${{ fromJson(needs.load-config.outputs.config).security.sast.exclude_paths || '' }}
      severity_threshold: ${{ fromJson(needs.load-config.outputs.config).security.sast.severity || 'ERROR' }}
      fail_on_findings: ${{ fromJson(needs.load-config.outputs.config).security.sast.fail_on_findings != false }}

  iac:
    needs: load-config
    if: fromJson(needs.load-config.outputs.config).security.iac.enabled == true
    uses: ./.github/workflows/iac-scan.yaml
    with:
      working_directory: ${{ fromJson(needs.load-config.outputs.config).security.iac.working_directory || '.' }}
      frameworks: ${{ fromJson(needs.load-config.outputs.config).security.iac.frameworks || '' }}
      soft_fail: ${{ fromJson(needs.load-config.outputs.config).security.iac.soft_fail == true }}

  # ---------------------------------------------------------------------------
  # 3. LANGUAGE BUILDS (Routed)
  # Explicit security gate validation - prevents bypass when gates are skipped
  # ---------------------------------------------------------------------------
  build-node:
    needs: [load-config, sast, iac]
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      (needs.sast.result == 'success' || needs.sast.result == 'skipped') &&
      (needs.iac.result == 'success' || needs.iac.result == 'skipped') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      needs.load-config.outputs.language == 'node'
    uses: ./.github/workflows/node-build.yaml
    with:
      working_directory: ${{ fromJson(needs.load-config.outputs.config).project.working_directory || '.' }}
      node_version: ${{ fromJson(needs.load-config.outputs.config).project.version || '20' }}
      run_tests: ${{ fromJson(needs.load-config.outputs.config).build.run_tests != false }}
      test_script: ${{ fromJson(needs.load-config.outputs.config).build.test_script || 'test' }}
      run_build: ${{ fromJson(needs.load-config.outputs.config).build.run_build == true }}
      build_script: ${{ fromJson(needs.load-config.outputs.config).build.build_script || 'build' }}
      artifact_path: ${{ fromJson(needs.load-config.outputs.config).build.artifact_path || '' }}

  build-python:
    needs: [load-config, sast, iac]
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      (needs.sast.result == 'success' || needs.sast.result == 'skipped') &&
      (needs.iac.result == 'success' || needs.iac.result == 'skipped') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      needs.load-config.outputs.language == 'python'
    uses: ./.github/workflows/python-build.yaml
    with:
      working_directory: ${{ fromJson(needs.load-config.outputs.config).project.working_directory || '.' }}
      python_version: ${{ fromJson(needs.load-config.outputs.config).project.version || '3.11' }}
      run_tests: ${{ fromJson(needs.load-config.outputs.config).build.run_tests != false }}
      test_script: ${{ fromJson(needs.load-config.outputs.config).build.test_script || 'python -m pytest' }}
      build_command: ${{ fromJson(needs.load-config.outputs.config).build.build_script || '' }}
      artifact_path: ${{ fromJson(needs.load-config.outputs.config).build.artifact_path || '' }}

  build-maven:
    needs: [load-config, sast, iac]
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      (needs.sast.result == 'success' || needs.sast.result == 'skipped') &&
      (needs.iac.result == 'success' || needs.iac.result == 'skipped') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      needs.load-config.outputs.language == 'maven'
    uses: ./.github/workflows/maven-build.yaml
    with:
      working_directory: ${{ fromJson(needs.load-config.outputs.config).project.working_directory || '.' }}
      java_version: ${{ fromJson(needs.load-config.outputs.config).project.version || '17' }}
      run_tests: ${{ fromJson(needs.load-config.outputs.config).build.run_tests != false }}
      test_script: ${{ fromJson(needs.load-config.outputs.config).build.test_script || 'mvn test -B' }}
      maven_args: ${{ fromJson(needs.load-config.outputs.config).build.build_script || '-B clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true -Dlicense.skip=true -Dmaven.antrun.skip=true' }}
      artifact_path: ${{ fromJson(needs.load-config.outputs.config).build.artifact_path || '' }}

  # ---------------------------------------------------------------------------
  # 4. DOCKER BUILD (Conditional)
  # ---------------------------------------------------------------------------
  docker:
    needs: [load-config, build-node, build-python, build-maven]
    if: |
      always() && 
      fromJson(needs.load-config.outputs.config).docker.enabled == true &&
      !contains(needs.*.result, 'failure') && 
      !contains(needs.*.result, 'cancelled')
    
    uses: ./.github/workflows/docker-build.yaml
    secrets: inherit
    with:
      working_directory: ${{ fromJson(needs.load-config.outputs.config).docker.working_directory || '.' }}
      dockerfile: ${{ fromJson(needs.load-config.outputs.config).docker.dockerfile || 'Dockerfile' }}
      registry_type: ${{ fromJson(needs.load-config.outputs.config).docker.registry_type || 'ecr' }}
      image_name: ${{ fromJson(needs.load-config.outputs.config).docker.image_name }}
      image_tag: ${{ fromJson(needs.load-config.outputs.config).docker.image_tag || github.sha }}
      # AWS Context for ECR
      aws_region: ${{ fromJson(needs.load-config.outputs.config).aws.region || 'us-east-1' }}
      role_to_assume: ${{ fromJson(needs.load-config.outputs.config).aws.role_to_assume || '' }}
      # Generic registry context
      registry_url: ${{ fromJson(needs.load-config.outputs.config).docker.registry_url || '' }}
      # Build configuration
      build_args: ${{ fromJson(needs.load-config.outputs.config).docker.build_args || '' }}
      platforms: ${{ fromJson(needs.load-config.outputs.config).docker.platforms || 'linux/amd64' }}

  # ---------------------------------------------------------------------------
  # 5. POST-BUILD SECURITY (SEQUENTIAL CHAIN)
  # Docker → Trivy → SBOM → SBOM-Scan
  # ---------------------------------------------------------------------------
  
  # STEP 1: Container Vulnerability Scan (Fails fast on CRITICAL CVEs)
  trivy:
    needs: [load-config, docker]
    if: |
      always() &&
      fromJson(needs.load-config.outputs.config).security.trivy.enabled == true &&
      needs.docker.result == 'success'
    uses: ./.github/workflows/trivy-scan.yaml
    with:
      scan_type: image
      image_uri: ${{ needs.docker.outputs.image_uri }}
      severity_threshold: ${{ fromJson(needs.load-config.outputs.config).security.trivy.severity || 'CRITICAL,HIGH' }}
      fail_on_vuln: ${{ fromJson(needs.load-config.outputs.config).security.trivy.fail_on_vuln != false }}
      ignore_unfixed: ${{ fromJson(needs.load-config.outputs.config).security.trivy.ignore_unfixed != false }}
      scanners: ${{ fromJson(needs.load-config.outputs.config).security.trivy.scanners || 'vuln,secret,misconfig' }}
      output_format: sarif

  # STEP 2: SBOM Generation (Only if Trivy passes or is skipped)
  sbom:
    needs: [load-config, docker, trivy]
    if: |
      always() &&
      fromJson(needs.load-config.outputs.config).security.sbom.enabled == true &&
      needs.docker.result == 'success' &&
      (needs.trivy.result == 'success' || needs.trivy.result == 'skipped')
    uses: ./.github/workflows/sbom-generate.yaml
    with:
      sbom_type: image
      image_uri: ${{ needs.docker.outputs.image_uri }}
      format: ${{ fromJson(needs.load-config.outputs.config).security.sbom.format || 'cyclonedx-json' }}
      upload_artifact: true

  # STEP 3: SBOM CVE Scan (Dependency-level vulnerabilities)
  sbom-scan:
    needs: [load-config, sbom]
    if: |
      always() &&
      fromJson(needs.load-config.outputs.config).security.sbom_scan.enabled == true &&
      needs.sbom.result == 'success'
    uses: ./.github/workflows/sbom-scan.yaml
    with:
      sbom_artifact_name: ${{ needs.sbom.outputs.sbom_artifact_name }}
      severity_threshold: ${{ fromJson(needs.load-config.outputs.config).security.sbom_scan.severity || 'medium' }}
      output_format: ${{ fromJson(needs.load-config.outputs.config).security.sbom_scan.format || 'sarif' }}

  # ---------------------------------------------------------------------------
  # 6. PIPELINE SUMMARY (Always runs for observability)
  # ---------------------------------------------------------------------------
  summary:
    if: always()
    needs: [load-config, sast, iac, build-node, build-python, build-maven, docker, trivy, sbom, sbom-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Generate Pipeline Summary
        run: |
          echo "## 🔐 Enterprise CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Configuration Info
          echo "### 📋 Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Language:** ${{ needs.load-config.outputs.language }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Pipeline Stages
          echo "### 📊 Pipeline Stages" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Pre-Build** | |" >> $GITHUB_STEP_SUMMARY
          echo "| ├─ Config Validation | ${{ needs.load-config.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ├─ SAST Scan | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| └─ IaC Scan | ${{ needs.iac.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | |" >> $GITHUB_STEP_SUMMARY
          echo "| ├─ Node.js Build | ${{ needs.build-node.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ├─ Python Build | ${{ needs.build-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| └─ Maven Build | ${{ needs.build-maven.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Container** | |" >> $GITHUB_STEP_SUMMARY
          echo "| └─ Docker Build | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Post-Build Security (Sequential)** | |" >> $GITHUB_STEP_SUMMARY
          echo "| ├─ 1️⃣ Trivy Scan | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ├─ 2️⃣ SBOM Generation | ${{ needs.sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| └─ 3️⃣ SBOM CVE Scan | ${{ needs.sbom-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall Status
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "### ❌ Pipeline Status: **FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more stages failed. Please review the logs above." >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "### ⚠️ Pipeline Status: **CANCELLED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Pipeline was cancelled. This may be due to a newer commit being pushed." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Pipeline Status: **SUCCESS**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All enabled stages completed successfully!" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Docker Image Info (if built)
          if [[ "${{ needs.docker.result }}" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🐳 Container Image" >> $GITHUB_STEP_SUMMARY
            echo "Image URI: \`${{ needs.docker.outputs.image_uri }}\`" >> $GITHUB_STEP_SUMMARY
          fi

      # Set final job status
      - name: Evaluate Final Status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::Pipeline failed - one or more stages reported failure"
            exit 1
          fi