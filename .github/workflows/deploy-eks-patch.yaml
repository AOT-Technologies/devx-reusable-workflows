name: "Module: Deploy to EKS (Raw Patch)"

# ------------------------------------------------------------------------------
# Kubernetes deployment via raw image patching (kubectl set image).
# PURPOSE:
# - Support legacy components not yet on Helm.
# - Fast, direct updates of existing deployments.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      # --- REQUIRED ---
      environment:
        description: "Target environment"
        type: string
        required: true
      image_uri:
        description: "Docker image URI to deploy"
        type: string
        required: true
      cluster_name:
        description: "EKS cluster name"
        type: string
        required: true
      
      # --- TARGET RESOURCES ---
      deployment_name:
        description: "Name of the Kubernetes deployment"
        type: string
        required: true
      container_name:
        description: "Name of the container within the deployment"
        type: string
        required: true
      
      # --- NAMESPACE ---
      namespace:
        description: "Kubernetes namespace"
        type: string
        default: "default"
      
      # --- AWS ---
      aws_region:
        description: "AWS region"
        type: string
        default: "ca-central-1"
      role_to_assume:
        description: "AWS IAM role for OIDC"
        type: string
        required: true
      
      # --- OPTIONS ---
      dry_run:
        description: "Dry run mode"
        type: boolean
        default: false
      timeout:
        description: "Rollout timeout (e.g., 5m)"
        type: string
        default: "5m"
      service_name:
        description: "Name of the Kubernetes service (for URL discovery)"
        type: string
        default: ""

    outputs:
      status:
        description: "Deployment status"
        value: ${{ jobs.deploy.outputs.status }}
      url:
        description: "Deployment URL"
        value: ${{ jobs.deploy.outputs.url }}

permissions:
  contents: read
  id-token: write
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    outputs:
      status: ${{ steps.result.outputs.status }}
      url: ${{ steps.deploy_url.outputs.url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup kubectl
        run: |
          aws eks update-kubeconfig \
            --name "${{ inputs.cluster_name }}" \
            --region ${{ inputs.aws_region }}
          
          kubectl cluster-info || {
            echo "::error::Failed to connect to EKS cluster"
            exit 1
          }

      - name: Patch Deployment Image
        id: patch
        run: |
          NAMESPACE="${{ inputs.namespace }}"
          DEPLOYMENT="${{ inputs.deployment_name }}"
          CONTAINER="${{ inputs.container_name }}"
          IMAGE="${{ inputs.image_uri }}"
          
          echo "🚀 Patching deployment '$DEPLOYMENT' in namespace '$NAMESPACE'..."
          echo "Container: $CONTAINER"
          echo "New Image: $IMAGE"
          
          DRY_RUN_FLAG=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            DRY_RUN_FLAG="--dry-run=server"
          fi
          
          kubectl set image "deployment/$DEPLOYMENT" "$CONTAINER=$IMAGE" \
            -n "$NAMESPACE" $DRY_RUN_FLAG 2>&1 | tee patch-output.txt
          
          if [[ $? -ne 0 ]]; then
            echo "::error::Failed to set new image for deployment"
            exit 1
          fi
          
          if [[ "${{ inputs.dry_run }}" != "true" ]]; then
            echo "📊 Waiting for rollout status..."
            kubectl rollout status "deployment/$DEPLOYMENT" -n "$NAMESPACE" --timeout=${{ inputs.timeout }}
          else
            echo "✅ Dry run completed successfully"
          fi

      - name: Set Result
        id: result
        if: always()
        run: |
          if [[ "${{ steps.patch.outcome }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Generate Deployment URL
        id: deploy_url
        if: always() && steps.patch.outcome == 'success'
        run: |
          # Try to get host from ingress rules first
          INGRESS_HOST=$(kubectl get ingress -n "${{ inputs.namespace }}" \
            -o jsonpath='{.items[0].spec.rules[0].host}' 2>/dev/null || echo "")
          
          # If no host, try to get ALB DNS name from status
          if [[ -z "$INGRESS_HOST" ]]; then
             INGRESS_ALB=$(kubectl get ingress -n "${{ inputs.namespace }}" \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
             
             if [[ -n "$INGRESS_ALB" ]]; then
               echo "url=http://$INGRESS_ALB" >> $GITHUB_OUTPUT
               exit 0
             fi
          fi

          if [[ -n "$INGRESS_HOST" ]]; then
            echo "url=https://$INGRESS_HOST" >> $GITHUB_OUTPUT
            exit 0
          fi

          # If no ingress host, try to get hostname from Service
          # Priority: 1. Specific service_name (if provided), 2. Any LoadBalancer in namespace
          SVC_FILTER=""
          if [[ -n "${{ inputs.service_name }}" ]]; then
            SVC_FILTER="${{ inputs.service_name }}"
          fi

          if [[ -n "$SVC_FILTER" ]]; then
            SVC_URL=$(kubectl get svc "$SVC_FILTER" -n "${{ inputs.namespace }}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          else
            SVC_URL=$(kubectl get svc -n "${{ inputs.namespace }}" \
              -o jsonpath='{.items[?(@.spec.type=="LoadBalancer")].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          fi
          
          if [[ -n "$SVC_URL" ]]; then
            echo "url=http://$SVC_URL" >> $GITHUB_OUTPUT
          else
            echo "url=N/A" >> $GITHUB_OUTPUT
          fi
