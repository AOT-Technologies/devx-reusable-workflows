name: "Utility: Auto-Merge PR"

# ------------------------------------------------------------------------------
# Automatically enables GitHub's native auto-merge feature for a Pull Request.
# Requirements: 
# 1. "Allow auto-merge" must be enabled in Repository Settings.
# 2. Status checks must be required in Branch Protection rules.
# ------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      merge_method:
        description: "Merge method to use: merge, squash, or rebase"
        type: string
        default: "squash"
    secrets:
      GH_TOKEN:
        description: "GitHub Token with pull-request:write permissions"
        required: true

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGE_METHOD: ${{ inputs.merge_method }}
        run: |
          echo "🚀 Enabling auto-merge for PR: $PR_URL"
          gh pr merge "$PR_URL" --auto --"$MERGE_METHOD"
